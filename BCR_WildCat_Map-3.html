<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCR Wild Cat Conservation Map</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020c1a;
  --surface:#081828;
  --surface2:#0d2035;
  --border:#1a3550;
  --accent:#f4900c;
  --accent2:#27ae60;
  --text:#e2eaf4;
  --text2:#8faec8;
  --text3:#4a6a88;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* STARS BACKGROUND */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.8}50%{opacity:.1}}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;height:64px;background:linear-gradient(180deg,rgba(2,12,26,.98) 0%,rgba(2,12,26,.7) 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:20px;z-index:100;backdrop-filter:blur(12px)}
#logo-area{display:flex;align-items:center;gap:12px;min-width:240px}
#logo-paw{font-size:28px;color:var(--accent)}
#logo-text{line-height:1}
#logo-text .brand{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--text);letter-spacing:.5px}
#logo-text .sub{font-size:10px;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
#stats-bar{display:flex;gap:32px;flex:1;justify-content:center}
.stat-item{text-align:center;line-height:1}
.stat-num{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
#header-actions{display:flex;gap:8px;align-items:center}
.btn-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;transition:all .2s}
.btn-toggle:hover,.btn-toggle.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* MAP */
#map{position:fixed;inset:0;z-index:1}

/* LEGEND PANEL */
#legend{position:fixed;top:64px;left:0;bottom:0;width:240px;background:rgba(8,24,40,.95);border-right:1px solid var(--border);z-index:50;overflow-y:auto;transition:transform .3s ease;backdrop-filter:blur(12px)}
#legend.hidden{transform:translateX(-100%)}
#legend-header{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
#legend-header h3{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px;text-transform:uppercase}
#legend-header p{font-size:11px;color:var(--text3);margin-top:4px}
#all-projects-btn{display:flex;align-items:center;gap:6px;width:100%;margin-top:10px;padding:8px 10px;background:rgba(244,144,12,.1);border:1px solid rgba(244,144,12,.3);border-radius:8px;color:var(--accent);font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;text-align:left}
#all-projects-btn:hover{background:rgba(244,144,12,.2);border-color:var(--accent)}
.legend-search{margin:8px 12px 4px;position:relative}
.legend-search input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.legend-search input::placeholder{color:var(--text3)}
.legend-items{padding:4px 0}
.legend-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.legend-item:hover{background:rgba(244,144,12,.08);border-left-color:var(--accent)}
.legend-item.active{background:rgba(244,144,12,.12);border-left-color:var(--accent)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-label{font-size:12px;color:var(--text2);flex:1;text-transform:capitalize}
.legend-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3)}
.legend-section{padding:8px 14px 4px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;border-top:1px solid var(--border);margin-top:4px}

/* DETAIL PANEL */
#detail{position:fixed;top:64px;right:0;bottom:0;width:360px;background:rgba(8,24,40,.97);border-left:1px solid var(--border);z-index:50;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;backdrop-filter:blur(16px)}
#detail.open{transform:translateX(0)}
#detail-close{position:sticky;top:0;z-index:10;background:rgba(8,24,40,.9);padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(8px)}
#detail-close h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text2);letter-spacing:1px;text-transform:uppercase}
#detail-close button{background:none;border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
#detail-close button:hover{border-color:var(--accent);color:var(--accent)}
#detail-photo{width:100%;height:180px;object-fit:cover;background:var(--surface2);display:block}
.detail-photo-placeholder{width:100%;height:180px;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);display:flex;align-items:center;justify-content:center;font-size:48px}
#detail-body{padding:16px}
#detail-category{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
#detail-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:8px}
#detail-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.meta-row{display:flex;align-items:flex-start;gap:8px;font-size:12px}
.meta-icon{font-size:14px;margin-top:1px}
.meta-label{color:var(--text3);min-width:52px}
.meta-val{color:var(--text2);flex:1}
#detail-donated{background:linear-gradient(135deg,rgba(244,144,12,.12) 0%,rgba(39,174,96,.08) 100%);border:1px solid rgba(244,144,12,.25);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.donated-amount{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--accent)}
.donated-label{font-size:11px;color:var(--text3);margin-top:2px}
.donated-years{font-size:11px;color:var(--text2);margin-top:4px}
#detail-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;border-left:2px solid var(--border);padding-left:12px}
#detail-org{font-size:12px;color:var(--text3);margin-bottom:14px}
#detail-org span{color:var(--text2)}
#detail-link a{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:8px;font-size:12px;text-decoration:none;transition:all .2s}
#detail-link a:hover{border-color:var(--accent);color:var(--accent)}
.yt-thumb{position:relative;display:block;border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;text-decoration:none}
.yt-thumb img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.yt-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);transition:background .2s}
.yt-thumb:hover .yt-play{background:rgba(0,0,0,.5)}
.yt-play-icon{width:56px;height:56px;background:#ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.yt-play-icon::after{content:'';border-style:solid;border-width:10px 0 10px 20px;border-color:transparent transparent transparent #fff;margin-left:4px}
.yt-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* GLOBE TOGGLE */
#view-toggle{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:60;display:flex;background:rgba(8,24,40,.9);border:1px solid var(--border);border-radius:24px;overflow:hidden;backdrop-filter:blur(12px)}
.view-btn{padding:8px 20px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.view-btn.active{background:var(--accent);color:#fff}

/* SCROLL */
#legend::-webkit-scrollbar,#detail::-webkit-scrollbar{width:5px}
#legend::-webkit-scrollbar-track,#detail::-webkit-scrollbar-track{background:transparent}
#legend::-webkit-scrollbar-thumb,#detail::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
#detail::-webkit-scrollbar-thumb{background:rgba(244,144,12,.35)}

/* MAPLIBRE OVERRIDES */
.maplibregl-popup{max-width:220px}
.maplibregl-popup-content{background:rgba(8,24,40,.95);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;backdrop-filter:blur(12px)}
.maplibregl-popup-tip{display:none}
.maplibregl-popup-close-button{color:var(--text2);font-size:16px;top:6px;right:8px}
.popup-name{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.3}
.popup-cat{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.popup-loc{font-size:11px;color:var(--text2)}
.maplibregl-ctrl-bottom-right,.maplibregl-ctrl-bottom-left{display:none}
.maplibregl-ctrl-top-right{margin-top:76px;margin-right:8px}
.maplibregl-ctrl-zoom button{background:var(--surface2)!important;border:1px solid var(--border)!important;color:var(--text2)!important;border-radius:8px!important}

/* SEARCH BOX */
#search-box{position:fixed;top:76px;left:250px;z-index:60;display:flex;align-items:center;gap:8px}
#search-input{background:rgba(8,24,40,.9);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:20px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:220px;backdrop-filter:blur(12px)}
#search-input::placeholder{color:var(--text3)}
#search-input:focus{border-color:var(--accent)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#loading.fade{opacity:0;pointer-events:none}
.loading-paw{font-size:56px;animation:pulse 1.2s ease-in-out infinite}
.loading-text{font-family:'Syne',sans-serif;font-size:16px;color:var(--text2);margin-top:16px;letter-spacing:1px}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}

@media (max-width:768px){
  #legend{display:none}
  #detail{width:100%;top:auto;bottom:0;height:70%;transform:translateY(100%)}
  #detail.open{transform:translateY(0)}
  #stats-bar .stat-item:nth-child(3){display:none}
  #search-box{display:none}
}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-paw">🐾</div>
  <div class="loading-text">Loading Wild Cat Conservation Map…</div>
</div>

<canvas id="stars"></canvas>

<!-- HEADER -->
<div id="header">
  <div id="logo-area">
    <div id="logo-paw">🐆</div>
    <div id="logo-text">
      <div class="brand">Big Cat Rescue</div>
      <div class="sub">Wild Cat Conservation Map</div>
    </div>
  </div>
  <div id="stats-bar">
    <div class="stat-item"><div class="stat-num" id="stat-projects">146</div><div class="stat-label">Projects</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-donated">$1.56M</div><div class="stat-label">Donated</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-countries">42</div><div class="stat-label">Countries</div></div>
    <div class="stat-item"><div class="stat-num" id="stat-species">34</div><div class="stat-label">Species</div></div>
  </div>
  <div id="header-actions">
    <button class="btn-toggle active" id="btn-legend" onclick="toggleLegend()">🦁 Legend</button>
    <button class="btn-toggle" id="btn-all" onclick="filterAll()">All Species</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- SEARCH -->
<div id="search-box">
  <input type="text" id="search-input" placeholder="🔍  Search projects…" oninput="filterSearch(this.value)">
</div>

<!-- LEGEND PANEL -->
<div id="legend">
  <div id="legend-header">
    <h3>Species</h3>
    <p>Click to filter by species</p>
    <button id="all-projects-btn" onclick="filterAll()">🌍 All Projects (146)</button>
  </div>
  <div class="legend-items" id="legend-items"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail">
  <div id="detail-close">
    <h4>Project Details</h4>
    <button onclick="closeDetail()">✕</button>
  </div>
  <img id="detail-photo" src="" alt="" onerror="this.style.display='none';document.getElementById('detail-photo-ph').style.display='flex'">
  <div class="detail-photo-placeholder" id="detail-photo-ph" style="display:none">🐆</div>
  <div id="detail-body">
    <div id="detail-category"></div>
    <div id="detail-name"></div>
    <div id="detail-donated">
      <div class="donated-amount" id="donated-amount"></div>
      <div class="donated-label">Total Donated by Big Cat Rescue</div>
      <div class="donated-years" id="donated-years"></div>
    </div>
    <div id="detail-meta"></div>
    <div id="detail-desc"></div>
    <div id="detail-org"></div>
    <div id="detail-link"></div>
    <div id="detail-youtube" style="margin-top:14px"></div>
  </div>
</div>

<!-- VIEW TOGGLE -->
<div id="view-toggle">
  <button class="view-btn active" id="btn-globe" onclick="setView('globe')">🌍 Globe</button>
  <button class="view-btn" id="btn-map" onclick="setView('mercator')">🗺 Map</button>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const PROJECTS = [{"name":"National Geographic Build a Boma","country":"Kenya","city":"","state":"","category":"LION","description":"Headed By National Geographic. Building and maintaining livestock enclosures to protect from predation by Lions. Helps protect big cats from retaliatory killings.","donated":3000.0,"years":"2015","website":"http://buildaboma.org","organization":"National Geographic","photo":"https://zeemapsimages.s3.amazonaws.com/56f7d5d7e2c4caf1c2bb508b5b85a1f6-14242319_1187461497943225_2772095091702403180_o.jpg","youtube":"","lat":-2.5165,"lng":37.4141},{"name":"Campaign against canned hunting","country":"South Africa","city":"","state":"","category":"LION","description":"Efforts to ban canned hunting in South Africa. Headed by global NGO, Campaign Against Canned Hunting (CACH).","donated":7000.0,"years":"2013","website":"http://www.cannedlion.org","organization":"","photo":"https://zeemapsimages.s3.amazonaws.com/e8dcd245a4bf61c50d35e7ff704ff725-1423394230.png","youtube":"","lat":-28.0441,"lng":24.9227},{"name":"Lion Guardians","country":"Tanzania","city":"","state":"Tanzania (general)","category":"LION","description":"Lion Guardians is a conservation organization dedicated to finding and enacting long-term solutions for people and lions to coexist across Kenya and Tanzania. Lion Guardians currently trains and supports a team of more than 80 East Africans who are actively protecting lions covering approximately 5,500 sq. kms (1.3 million acres).","donated":3067.0,"years":"2015","website":"http://lionguardians.org/about-us/","organization":"Lion Guardians","photo":"https://zeemapsimages.s3.amazonaws.com/61b76013bd368e682e41fa25e4db498f-logo.png","youtube":"","lat":-8.8353,"lng":37.1137},{"name":"Bay Area Puma Project","country":"United States","city":"Santa Cruz","state":"","category":"COUGAR","description":"Headed By Felidae Conservation Fund. Long term research and conservation project designed to conserve viable puma populations and minimise conflict in the San Fransico Bay area.","donated":6500.0,"years":"2015, 2019","website":"http://felidaefund.org/?q=bay-area-puma-project","organization":"Felidae Conservation Fund","photo":"https://zeemapsimages.s3.amazonaws.com/920820bb36235834d54a6fb16149143b-f2db1194dd5c9bd616a35be5190d381e-15697760_10154459285669340_6895585669616675322_n.jpg","youtube":"","lat":36.5144,"lng":-119.1823},{"name":"Bay Area Bobcat Project","country":"United States","city":"San Francisco","state":"","category":"BOBCAT","description":"Headed by Felidae Conservation Fund. The Bay Area Bobcat Study aims to look at how human development and habitat fragmentation affects bobcat populations, population status, mortality factors, and health, all of which have not been evaluated in depth for the region.","donated":9254.0,"years":"2015, 2017, 2019","website":"http://www.felidaefund.org/?q=bay-area-bobcats-page","organization":"Felidae Conservation Fund","photo":"https://zeemapsimages.s3.amazonaws.com/d6603c21bea9b5182ea90a4b36e3ce5f-db393d4c2edddd526dd65005678ee3ef-bobcat.jpg","youtube":"","lat":35.9969,"lng":-120.7691},{"name":"Tiger Well Fences","country":"India","city":"","state":"","category":"TIGER","description":"Open farm wells in the buffer zone of Bandhavgarh Tiger Reserves are proving to be a deathtrap for wild animals. There have been several cases of wild animals, including tigers and leopards, drowning by accidentally falling in such open wells dug by villagers, especially in areas close to the core zone. Around 2500 such open farmwells exist around the core zone of Bandhavgarh Tiger Reserve. The Corbett Foundation has initiated a project to install chain-linked fencing around such open farm wells to prevent accidental drowning of animals. Big Cat Rescue, has funded fencing around 56 wells around Bandhavgarh to date.","donated":61240.0,"years":"2016, 2017, 2018, 2019, 2021","website":"http://www.corbettfoundation.org/what-we-do.php","organization":"The Corbett Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/23f3e5550179aacadff95d1fdc95c158-18a3211ab4be39182df7304089b93379-wells.jpg","youtube":"","lat":21.2633,"lng":79.3229},{"name":"Sand Cats in Morocco","country":"Morocco","city":"","state":"","category":"SAND CAT","description":"First-ever study on the ecology and behaviour of the Sand Cat in Morocco. im of the study is to investigate how sand cats co-exist in shared habitats and the distribution of the species within the moroccan sahara. Once sufficient data is collected, a long-term study is proposed to expand the research across the whole country to determine where the species live in high, medium and low densities, and where they are missing.","donated":13000.0,"years":"2016, 2017, 2018, 2019","website":"https://www.facebook.com/Sand-Cat-Sahara-Team-168659190226714/","organization":"Sand Cat Sahara Team","photo":"https://zeemapsimages.s3.amazonaws.com/f9d04c915f21b61082387cc111a66938-2c5d42fba82b5bc1654e82eecc1c6526-sand_cat_2.jpg","youtube":"","lat":33.5223,"lng":-9.5206},{"name":"Urban Caracal Project","country":"South Africa","city":"Cape Town","state":"","category":"CARACAL","description":"The Cape Peninsula is a biodiversity hotspot that has lost almost all of its large mammals such as cape lions, leopards and brown hyenas. Caracals as a result may play a major role in maintaining the ecosystem as they are the largest remaining predator in the area. This study on caracals is a tool to understand how urbanisation may be threatening wildlife and other parts of the world affected by similar factors.","donated":3000.0,"years":"2016, 2019","website":"http://www.urbancaracal.org/about/","organization":"Urban Caracal Project","photo":"https://zeemapsimages.s3.amazonaws.com/9dd22e06c1497e489c30964f8cf26300-71a2fb66e63db417f013e3492bb023d3-1460432614496.jpg","youtube":"","lat":-32.7861,"lng":20.6762},{"name":"Black Footed Cat Conservation","country":"United States","city":"","state":"","category":"BLACK FOOTED CAT","description":"With 24 years running this is one of the longest running small cat projects. More than 60 cats have been caught and collared over 100 times and what is known today about the species has been found during this field study in South Africa. The study collects data on the ecology of the species, like home range sizes, home range usage, social organisation, food habits but also mortality, longevity, dispersal and reproduction of the population.","donated":3500.0,"years":"2016, 2018","website":"http://black-footed-cat.wild-cat.org","organization":"Black Footed Cat Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/e660437be5b8cbd9ada43c39df5c99a8-Blackfooted-cat-LaWanna-Mitchell.jpg","youtube":"","lat":35.7743,"lng":-93.883},{"name":"Pallas Cat Ecology & Conservation","country":"Russia","city":"","state":"","category":"PALLAS CAT","description":"The Pallas Cat Study and Conservation Program aims to collect data pertaining to the true conservation status of the species. The Pallas Cat is one of the least studied wild cats in the world despite having a large habitat ranging across Russia, Mongolia and North-Western China.","donated":2000.0,"years":"2016, 2017","website":"http://www.savemanul.org/eng/","organization":"Pallas Cat Study & Conservation Program","photo":"https://zeemapsimages.s3.amazonaws.com/1787bb51667b142aab58f181316a8a7a-kittyhed.jpg","youtube":"","lat":61.1648,"lng":107.6286},{"name":"Tanzania Lion Illumination Project","country":"Tanzania","city":"Kilosa","state":"","category":"LION","description":"The Tanzania Lion Illumination Project is a small, non-profit organization that works out in Tanzania installing \"Lion Lights\" on to livestock Bomas in areas where they are needed. The solar strobe lights are installed on the bomas, where domestic animals are kept, which repels predators. With human populations increasing, there is more pressure on wildlife because of habitat loss, and the availability and ease of catching livestock. As a result, lion and leopard populations have decreased drastically in the last 20 years. The lights help rural communities protect their livestock and reduce retaliatory killings.","donated":7500.0,"years":"2016, 2017","website":"http://www.tanzlight.org/home.html","organization":"Tanzania Lion Illumination Project","photo":"https://zeemapsimages.s3.amazonaws.com/cd8d24459845ea8f26a3bc86611a3f24-images.jpeg","youtube":"","lat":-5.8105,"lng":36.2679},{"name":"Sumatran Tiger Conservation","country":"Indonesia","city":"","state":"Bali","category":"TIGER","description":"The International Tiger Project (ITP) is a not-for-profit project supporting Sumatran tiger conservation, rainforest protection, and local community partnerships. One major strategy employed by ITP to combat these issues is the use of camera traps to monitor tigers. The location of their work is the Bukit Tigapuluh Reserve, which has been identified as one of the priority landscapes for long-term tiger conservation in Sumatra. A Wildlife Protection Unit (WPU), initiated by ITP, adds additional protection for the tigers with an on-the-ground patrol that works with local communities to see that both tigers and humans remain safe and live in harmony.","donated":2575.0,"years":"2016","website":"http://www.tiger.org.au/international-tiger-project-the-bukit-tigapuluh-project","organization":"The International Tiger Project (ITP)","photo":"https://zeemapsimages.s3.amazonaws.com/1430cf86bf97187ab76ba556c5b0ffe9-21273562_1683466585020422_2335154348473554880_o.jpg","youtube":"","lat":-3.126,"lng":113.3308},{"name":"Small Borneo Wild Cats","country":"Malaysia","city":"","state":"Sarawak","category":"FLAT HEADED CAT","description":"Working with the Small Wild Cat Conservation Foundation, this project aims to use camera traps and GPS collars to better understand the species of small wild cat found in Borneo. There are only five species of cats in Borneo, including the flat-headed cat and bay cat, but little is known on their exact occurrence. In order to understand their needs, researching where they reside is essential. As habitat are increasingly being reduced for oil palm and other land use, these Felids will eventually only have National parks and Wildlife Sanctuaries to persist.","donated":5000.0,"years":"2016","website":"http://sarawakwildlifecon.wixsite.com/wceunimas","organization":"Sarawak Wildlife Conservation/ Small Wildcat Conservation Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/bc7fa9717d31fd9a6a0ae959cfe9122c-flatheaded2.jpg","youtube":"","lat":5.6911,"lng":104.9294},{"name":"Jaguarundi US-Mexico Borderlands","country":"United States","city":"","state":"AZ","category":"JAGUARUNDI","description":"Felidae conservation fund are examining Jaguarundi distribution in the US-Mexico Borderlands (National Park Service lands), with the objective to address the gap in information of Jaguarundi presence in Northern Mexico, Southern Arizona and Southern Texas.","donated":1000.0,"years":"2016","website":"","organization":"Felidae Conservation Fund","photo":"https://zeemapsimages.s3.amazonaws.com/b780c14fc2012b862a9b88df2a7323b6-1200px-Jaguarondi_portrait.jpg","youtube":"","lat":36.3062,"lng":-97.9601},{"name":"Ocelots of Sky Island","country":"United States","city":"Tucson","state":"AZ","category":"OCELOT","description":"The Sky Island Alliance started researching Ocelots in 2006. In 2009 they documented the first living record of an Ocelot in Arizona and in 2011 they recorded the first evidence of ocelots breeding in the Sky Islands , with a kitten and mother caught on camera trap film. Sky Island Alliance protects and restores the biodiversity and natural heritage of the Sky Islands using science, education, and advocacy to connect the binational landscapes, people, and wildlife.","donated":1000.0,"years":"2016","website":"http://www.skyislandalliance.org/2015/06/a-decade-of-successes-in-jaguar-and-ocelot-conservation/","organization":"Sky Island Alliance","photo":"https://zeemapsimages.s3.amazonaws.com/37dd06067f61ecf1189f3a4f0020d6c3-Ocelot_HeaderSize.png","youtube":"","lat":32.0811,"lng":-111.0747},{"name":"Andean Cat Alliance","country":"Argentina","city":"","state":"","category":"ANDEAN CAT","description":"The Andean cat (Leopardus jacobita) is a small feline found in the high Andes of Argentina, Bolivia, Chile, and Peru and in the northern portion of the Patagonian steppe in Argentina. It is one of the least known cats in the world and is considered the most threatened feline in America, being among the five most endangered cats in the world. The Andean Cat Alliance obtains information about the presence and distribution of the Andean cat allowing for effective species research and conservation","donated":2000.0,"years":"2016, 2020","website":"http://www.gatoandino.org/index.php/en/","organization":"Andean Cat Alliance","photo":"https://zeemapsimages.s3.amazonaws.com/bdd004b032304ec9a05f38b77d992c57-323cf0a7c3b155a76d9d050ef228776c-15591311_1411393675562396_8850990504087527430_o.jpg","youtube":"","lat":-40.7483,"lng":-61.5883},{"name":"Ewaso Lions & Warrior Watch","country":"Kenya","city":"","state":"","category":"LION","description":"2016 - Ewaso Lions conserve Kenya\u2019s lions and other large carnivores by promoting coexistence between people and wildlife; conflict between people and carnivores usually occurs over livestock. Funds from the Walkabout will be used to assist with Ewaso Lions\u2019 research to understand the factors that influence human tolerance of large carnivores, and what large carnivores need in order to share the landscape with people. 2019 - In 2010, Ewaso Lions launched Warrior Watch, which protects lions, by engaging Samburu Warriors, a group traditionally neglected in conservation decision-making. Warrior Watch makes the Samburu Warriors ambassadors for the lions, while raising awareness about conservation, and advocating peaceful coexistence with lions and wildlife. The program builds on the Warriors traditional protection role by increasing their ability to mitigate human-carnivore conflict.","donated":3300.0,"years":"2016 & 2019","website":"http://ewasolions.org/research/","organization":"","photo":"https://zeemapsimages.s3.amazonaws.com/eaff3a9322bb4f25bc83519f97274e1c-fbef5cd55e2d7506ff4b715824ab3439-1477452_10151826951711994_1198897345_n.jpg","youtube":"","lat":1.0079,"lng":36.1922},{"name":"Rocky Mountain Wild","country":"United States","city":"","state":"CO","category":"CANADA LYNX","description":"Stable wildlife populations require healthy and connected ecosystems. Habitat fragmentation is recognized as a primary cause of the decline of species worldwide, as it causes habitat loss and causes the division of large habits into smaller isolated areas. Roads and highways, in particular, fragment habitat, and create barriers to wildlife movement, and often result in animal-vehicle collisions. Rocky Mountain Wild ate building wildlife corridors connecting key canadian lynx habitats and implementing a species safety net to advance conservation of the species.","donated":2788.0,"years":"2016","website":"http://rockymountainwild.org","organization":"Rocky Mountain Wild","photo":"https://zeemapsimages.s3.amazonaws.com/14e7649e02e4fad6da7d0be6743699e2-VailPass.jpg","youtube":"","lat":39.4909,"lng":-93.3427},{"name":"Jaguars of Latin America","country":"Belize","city":"","state":"","category":"JAGUAR","description":"Wildlife Conservation Society deploy scientists across multiple regions to gather information on threats to jaguar habitats. The threats to jaguars include deforestation due to conversion to cattle pastures and retaliatory killings due to conflict with ranchers. WCN is working with communities on wildlife conservation, reducing human-animal conflicts, advising and supporting protected area law enforcement and monitoring jaguar populations.","donated":2361.0,"years":"2016","website":"http://www.wcs.org/our-work/species/jaguars","organization":"Wildlife Conservation Society","photo":"https://zeemapsimages.s3.amazonaws.com/663aa57043b762d4f20e3863021b7fcb-6r11pzt4or_Julie_Larsen_Maher_7663_Jaguar_ZM_12_19_12_hr.jpg","youtube":"","lat":18.7712,"lng":-87.6347},{"name":"Sunda Clouded Leopard","country":"Indonesia","city":"","state":"","category":"CLOUDED LEOPARD","description":"The Sunda clouded leopard is a medium-sized wild cat found on the two Indonesian islands of Borneo and Sumatra. The Species is classified as Vulnerable on the IUCN Red List with fewer than 10,000 individuals remaining. The Species main threat is Habitat Loss. Very little is known about the Sunda Clouded Leopard, so as a result the Borneo Clouded Leopard Program are working to advance understanding and enhance conservation, whilst determining the best ways to keep the species from Extinction.","donated":3357.0,"years":"2016, 2018","website":"https://www.wildcru.org/research/research-4/","organization":"Borneo Clouded Leopard Programe/ Oxford Universities Wildlife Conservation Research Unit","photo":"https://zeemapsimages.s3.amazonaws.com/db38d06a20b04cf653966bb2df584fd2-12672068_1031243456950727_3471672775728285695_o.jpg","youtube":"","lat":1.8325,"lng":115.654},{"name":"CITES - Anti Tiger Farming/Breeding","country":"South Africa","city":"Johannesburg","state":"Gauteng","category":"TIGER","description":"Big Cat Rescue attended the 17th Conference of the Parties to CITES in Johannesburg, South Africa. CITES (the Convention on International Trade in Endangered Species of Wild Fauna and Flora) is an international agreement between governments. Its aim is to ensure that international trade in specimens of wild animals and plants does not threaten their survival. Big Cat Rescue joined several other Animal Welfare organizations including Born Free at the 12 day conference to highlight and educate attendees about the importance of ending Tiger farming.","donated":2932.0,"years":"2016","website":"","organization":"","photo":"https://zeemapsimages.s3.amazonaws.com/9e7898fd080099b89fa31f84763cc665-CoP17_Rhino_hp.jpg","youtube":"","lat":-27.7554,"lng":30.963},{"name":"Iberian Lynx","country":"Spain","city":"","state":"","category":"IBERIAN LYNX","description":"The Iberian Lynx is the world's most endangered cat. In 2002 there were fewer than 100 left in the wild, and although there are now over 400, their numbers are still declining. WWF has developed a project using high tech cameras spread across the remaining habitat of the Lynx, in the hopes of helping conservationists better understand and protect the Lynx.","donated":1000.0,"years":"2016","website":"http://wwf.panda.org/wwf_news/wwf_needs_your_help/iberian_lynx/index.cfm","organization":"World Wildlife Fund Europe (WWF)","photo":"https://zeemapsimages.s3.amazonaws.com/65ebd718876103b23264a22aac71c296-Unknown.jpeg","youtube":"","lat":40.2567,"lng":-3.3923},{"name":"Pampas Cat Conservation","country":"Peru","city":"","state":"","category":"PAMPAS CAT","description":"The Pampas Cat is a small cat that has been poorly studied despite its wide distribution range in South America. Even though this species is listed as Vulnerable and Data Deficient by the Ecuadorian and Peruvian Government legislation; its distributional and ecological research have been focused on the Andes and Cerrado, and almost entirely excluding its desert and dry forest populations.The Neotropical Wetland Training Centre, in partnership with Small Wildcat Conservation foundation, set out to confirm Pampas Cat presence and evaluate if human-\u00adcat conflict exists in the Sechura Desert and seasonal dry forest of northwestern Peru and southwestern Ecuador.","donated":1000.0,"years":"2016","website":"","organization":"The Neotropical Wetland Training Centre/ Small Wildcat Conservation Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/48ed2564a852a989f8b98ceee37a15d8-pampascat1.jpg","youtube":"","lat":-9.842,"lng":-75.3437},{"name":"Mara Cheetah Project","country":"Kenya","city":"","state":"","category":"CHEETAH","description":"At present, the Serengeti-Mara ecosystem is one of the two remaining strongholds for the global cheetah population. Whilst in the Serengeti there has been a long-term cheetah project running for over 25 years, surprisingly little is known about the cheetahs in the Greater Mara Ecosystem. As a result the Kenya Wildlife Trust set-up the Mara Cheetah Project in June 2013.","donated":1000.0,"years":"2016","website":"http://www.maracheetahs.org","organization":"Mara Cheetah Project","photo":"https://zeemapsimages.s3.amazonaws.com/79aff595ac6a85ff9dd070896ee26caa-20543669_1392869170797317_8184802135667372048_o.jpg","youtube":"","lat":-1.316,"lng":38.4086},{"name":"Small Neotropical Wildcats","country":"Brazil","city":"","state":"","category":"MARGAY","description":"The team of the Oncilla Project are developing previous work in the threatened and fragmented ecosystem of the Interior Atlantic Forest in Brazil. In this habitat live three Small Neotropical Felidae, the Oncilla (Leopardus guttulus), Margay (Leopardus wiedii) and Jaguarundi (Puma yaguaroundi). These species are included in the brazilian and IUCN threatened species list, because of the decline in their habitat and food availability.","donated":1000.0,"years":"2016","website":"https://sites.google.com/site/leopardussmallcats/","organization":"The Oncilla Project","photo":"https://zeemapsimages.s3.amazonaws.com/a46b97ba039525491a895b029da43eb0-Bigodes.jpg","youtube":"","lat":-14.8426,"lng":-52.2514},{"name":"African Parks","country":"United States","city":"","state":"","category":"RANGERS","description":"African Parks is a non-profit conservation organisation that takes on direct responsibility for the rehabilitation and long-term management of national parks and protected areas in partnership with governments and local communities. African Parks focuses on effective law enforcement measures, conflict mitigation schemes, and community engagement in order to protect Threatened species such as lions, leopards and cheetah, along with providing them with the habitat and security of core areas the animals need in order to breed and thrive. African Parks had the largest counter-poaching force in all of Africa for any one NGO. 850 Rangers provide safety for both people and wildlife","donated":2000.0,"years":"2017, 2020","website":"https://www.african-parks.org","organization":"African Parks","photo":"https://zeemapsimages.s3.amazonaws.com/65f7d0481a86b69eb82af2ba868f6399-254a4c514fbd6b366d2169541f477ec6-23275298_1078925508910120_7098713443103064667_o.jpg","youtube":"","lat":37.0173,"lng":-97.1234},{"name":"Thin Green Line Foundation","country":"Australia","city":"","state":"","category":"RANGERS","description":"The Thin Green Line Foundation provide rangers on the frontline of conservation with essential anti-poaching equipment and training, and financial support to the widows and orphans of park rangers killed in the line of duty. The rangers work in various countries, including Africa, Asia, Indonesia and Australia.","donated":7200.0,"years":"2016, 2018","website":"https://www.thingreenline.org.au","organization":"The Thin Green Line Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/25ed08e6e3cd1ed91f93c2a0a8731c30-ed0dff8f1939471748865d7eecdd760b-Unknown.jpg","youtube":"","lat":-26.8738,"lng":134.7096},{"name":"Tsavo Cheetah Project","country":"Kenya","city":"Tsavo","state":"","category":"CHEETAH","description":"The Tsavo Cheetah project aims to protect and conserve the Tsavo ecosystem cheetah population for the long-term survival of the species. They work with stakeholders and communities in addition to governmental bodies to foster the coexistence with local residents and influence wildlife laws and policies. The Tsavo Ecosystem has been concluded as a priority focal area for cheetah research and conservation. Covering an area of 16,000 square miles (42,000 square kilometres) the Tsavo Ecosystem in south eastern Kenya, comprises the unfenced Tsavo West and Tsavo East National Parks and a diverse range of ethnic communities and tribes.","donated":14250.0,"years":"2017,2019,2021,2024","website":"http://www.tsavocheetahproject.org","organization":"Tsavo Cheetah Project","photo":"https://zeemapsimages.s3.amazonaws.com/61b4897b80d3875382cfb15adf756548-AI-Cheetah.jpg","youtube":"","lat":-2.9569,"lng":36.0032},{"name":"Securing a missing link in the Amazon","country":"Ecuador","city":"","state":"","category":"JAGUAR","description":"The Rainforest Trust and their local parter, Center for the Development of an Indigenous Amazon (CEDIA) are working to protect a missing link that will create a combined 7.8 million-acre tai-national corridor, safeguarding critical Amazon Rainforest Habitat across Peru, Ecuador and Colombia. The missing link corridor will be secured by expanding a current Reserve of more than 1.3 million acres, protecting against illegal logging, oil exploitation and agricultural enrichment.","donated":2500.0,"years":"2017","website":"https://www.rainforesttrust.org/project/securing-a-missing-link-in-the-amazon/","organization":"Rainforest Trust","photo":"https://zeemapsimages.s3.amazonaws.com/7849b527a26d3d30c644b507b74e98e9-jag.jpg","youtube":"","lat":-4.1804,"lng":-77.9365},{"name":"Saving the Florida Panther","country":"United States","city":"","state":"FL","category":"COUGAR","description":"The Nature Conservancy is leading an effort to establish links between existing spaces and panther habitat with a goal of ensuring permanent protection for 7,300 acres.","donated":4000.0,"years":"2017","website":"http://www.nature.org/ourinitiatives/regions/northamerica/unitedstates/florida/explore/save-the-florida-panther.xml","organization":"The Nature Conservancy","photo":"https://zeemapsimages.s3.amazonaws.com/f48d3c6ddfa6760156f01fc505583adc-florida-panther-2.jpg","youtube":"","lat":35.7285,"lng":-93.0162},{"name":"Anti-Snare Project","country":"India","city":"","state":"Karnataka","category":"TIGER","description":"India's amazing biodiversity has long faced threats from poachers using simple yet horribly effective hunting devices; traps & snares. A simple instrument consisting of an anchored wire with a sliding noose, a snare, is camouflaged with vegetation and set up on animal trails. These trails are not often accessible to people, and sometimes the animals routes are artificially narrowed to ensure they are led straight into the snare. Protected areas have a buffer zone around it intended to be an area defining the boundaries of human habitation. This area has frequent wild animal movement and poachers lay wire snares along animal trails. It is a confirmed fact that Bandipur Tiger Reserve in Karnataka has lost 3 tigers, 2 leopards and 1 elephant to snares in the last 2 years and this in just one of India's 100+ protected areas. This project aims to eradicate the menace of snares and traps from the forests, with twin goals of, removing existing snares and dissuading further snaring through regular de-snaring walks and an active intelligence network to zero in on individual poachers.","donated":1000.0,"years":"2017","website":"http://www.wti.org.in","organization":"Wildlife Trust India","photo":"https://zeemapsimages.s3.amazonaws.com/a8058505926cae62387779d2316fc3a4-ph_11187_47342.jpg","youtube":"","lat":23.4617,"lng":79.1175},{"name":"First International Small Cat Conservation Summit","country":"United Kingdom","city":"","state":"","category":"SMALL CATS","description":"Big Cat Rescue donated to the first international Small Cat Conservation summit. Paticipants working on small cat conservation worldwide attended to share research and conservation findings about a variety of small cat species, including fishing cats, jungle cats, pallas cats, pampas cats, flat headed cats, margay, ocelot etc.","donated":3000.0,"years":"2017","website":"","organization":"Wild Cat Network","photo":"https://zeemapsimages.s3.amazonaws.com/6237c6a1be37344ed205e4cd1a0aec97-800342f85332192ac339db69ad4e14dd.jpg","youtube":"","lat":57.6992,"lng":-3.5378},{"name":"Threat Reduction for Fishing Cats","country":"Nepal","city":"","state":"","category":"FISHING CAT","description":"In Situ conservation project focusing on the reduction of threats to Fishing Cats in Nepal. These threats can include poaching, road fatalities, habitat loss and poisoning.","donated":3000.0,"years":"2017","website":"","organization":"Small Wildcat Conservation Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/2400836dc32e9f9d9e81d37d2177325d-neptune-fishing-cat.jpg","youtube":"","lat":26.1545,"lng":85.8588},{"name":"Wildlife Rescue, Rehabilitation & Conflict Mitigation","country":"India","city":"","state":"Maharashtra","category":"LEOPARD","description":"The Indian Leopard (Panthera pardus fusca), once widely distributed across the Indian subcontinent, has in recent years come under threat. Due to a variety of factors including but not limited to habitat encroachment and poaching, they are becoming increasingly rare outside the bounds of designated nature preserves and protected areas. Wildlife SOS is an organization working with the government in India to address the current needs of India's Leopards. Assessing threats, providing education and awareness, rehab & release of injured cats and studying ecology/behavior","donated":1000.0,"years":"2017","website":"http://wildlifesos.org","organization":"Wildlife SOS India","photo":"https://zeemapsimages.s3.amazonaws.com/44f87cd441de64af657b4073e6a4ed4a-Manikdoh_compres.jpg","youtube":"","lat":17.6473,"lng":80.9603},{"name":"African Golden Cat Ecology & Conservation","country":"Cameroon","city":"","state":"","category":"AFRICAN GOLDEN CAT","description":"First study of the African golden cat in Cameroon, focusing on obtaining population number, in addition to ecological needs, and local education to change attitudes towards conservation","donated":2500.0,"years":"2017","website":"http://carnivores.org","organization":"S.P.E.C.I.E.S","photo":"https://zeemapsimages.s3.amazonaws.com/8a1fef97df015add608b9a7d889da12e-Golden-cat-4-Mills.jpg","youtube":"","lat":4.4234,"lng":11.2719},{"name":"Northern Tanzania Big Cats Conservation Initiative","country":"Tanzania","city":"Arusha","state":"","category":"LEOPARD","description":"The Northern Tanzania Big Cats Conservation Initiative is dedicated to the long-term protection of highly threatened African lions, cheetahs, and leopards. Lion, cheetah, and leopard populations have come under extreme pressure in northern Tanzania over the last twenty years, particularly outside of protected areas. Threats challenging the survival of these big cats are primarily due to conflict with humans and the loss of habitat and prey species. In this region, more than 92 percent of wildlife habitats are landscapes where humans and wildlife interact. Therefore, the committed involvement of local communities is essential for the long-term survival of big cats.","donated":2000.0,"years":"2017, 2019","website":"https://africanpeoplewildlife.org","organization":"The African People & Wildlife Fund","photo":"https://zeemapsimages.s3.amazonaws.com/9158ada53ce5ba1948ece890115df29f-332832b401125e7b545e35333c1dcfa4-Leopards_Tanzania-compressor.jpg","youtube":"","lat":-5.7013,"lng":34.6},{"name":"Jaguarundi Ecology & Conservation","country":"Argentina","city":"","state":"","category":"JAGUARUNDI","description":"The jaguarundi (Puma yagouaroundi) is one of the most unusual of the New World cat species, being somewhat weasel-like in appearance. It has a wide distribution across North, Central and South America, from southern Texas in the United States, south as far as northern Argentina. This project aims to start filling the gaps in knowledge of the Jaguarundi, specifically in Argentina.","donated":1000.0,"years":"2017","website":"","organization":"Felidae Conservation Fund/ S.P.E.C.I.E.S","photo":"https://zeemapsimages.s3.amazonaws.com/511acde9681568009561ff87df4cf70a-22728771_810310899139698_980110769020251376_n.jpg","youtube":"","lat":-39.9751,"lng":-62.7745},{"name":"Journey of the Jaguar","country":"Mexico","city":"","state":"","category":"JAGUAR","description":"In partnership with governments, corporations, and local communities, Panthera is working to preserve the genetic integrity of the jaguar by protecting core jaguar populations and the vital connectivity that has sustained them for hundreds of thousands of years","donated":1000.0,"years":"2017","website":"https://www.journeyofthejaguar.org","organization":"Panthera","photo":"https://zeemapsimages.s3.amazonaws.com/00c0cb327f36cbe97a8bec7a5f2b4f0c-20232677_10154895693613763_71263547927700327_o.jpg","youtube":"","lat":21.3641,"lng":-104.6239},{"name":"Predator Compensation Fund","country":"Kenya","city":"Makutano","state":"","category":"LION","description":"Big Life Foundation is working to better balance the costs and benefits of living with wildlife and thereby replace conflict and retaliation with tolerance and cohabitation. In a battle against spears and poison, lions lose. As do cheetahs, leopards and all the other predators of Africa\u2019s plains. This novel conservation strategy remains one of the most far-reaching and effective projects yet conceived, the first project of its kind implemented in Maasailand.","donated":3500.0,"years":"2017, 2018","website":"https://biglife.org/predator-compensation","organization":"Big Life Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/151a2ae05f47937c98255fd109840c0c-502bdf65dfde02a18431ec98b640c146-lion-2.jpg","youtube":"","lat":-0.3377,"lng":34.1827},{"name":"Cougar Conservation & Advocacy","country":"United States","city":"","state":"","category":"COUGAR","description":"The Mountain Lion Foundation works closely with legislative, governmental and conservation groups to heighten public awareness and educate policy makers on conservation issues such as hunting, habitat loss, workable wildlife corridors, harmonious human/mountain lion interactions, and the vital role of the mountain lion in a healthy ecosystem.","donated":5038.0,"years":"2017, 2018","website":"http://mountainlion.org/index.asp","organization":"Mountain Lion Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/64b63af785193555d7d1cfdf89a70325-d00f3108dbf93d018e900a21fd69083d-533569_10150652533662205_1606388673_n.jpg","youtube":"","lat":37.6963,"lng":-94.8299},{"name":"Targeting Poaching & Illegal Trafficking","country":"Zambia","city":"","state":"","category":"LION","description":"Working Dogs for Conservation is the world\u2019s leading conservation detection dog organization. They are pioneers in using dogs\u2019 extraordinary sense of smell to further conservation and aid in the fight against wildlife trafficking.","donated":2887.0,"years":"2017","website":"https://wd4c.org/poachingtrafficking.html","organization":"Working Dogs for Conservation","photo":"https://zeemapsimages.s3.amazonaws.com/9d7cabed60d7b9b8b2aa2d22d82ad98d-10428175_680464958710482_5860782645463050781_o.jpg","youtube":"","lat":-13.4105,"lng":25.4566},{"name":"Ocelot Ecology & Conservation","country":"Trinidad and Tobago","city":"","state":"","category":"OCELOT","description":"The Ocelot is one of 13 species of wild cat native to the western hemisphere and one of 10 felids inhabiting Latin America. The history of the ocelot on Trinidad is unique for several reasons. It is the only place that the ocelot has evolved in the absence of larger mammalian carnivores. On Trinidad it is the largest predatory mammal.This study aims to look at the ecology of Trinidad\u2019s ocelot population, define its place in the evolutionary history of the ocelot as a species and develop an integrative plan for its long-term conservation. The study will investigate the impacts of deforestation, illegal hunting, urbanization, and different types of agricultural land use and intensity on ocelot habitat suitability, population density, and the diversity of prey species available to the predator.","donated":2541.0,"years":"2017","website":"http://carnivores.org","organization":"S.P.E.C.I.E.S","photo":"https://zeemapsimages.s3.amazonaws.com/442b139028c821ff360d1b2273278285-OceolotsTrinidad19429705_758831407620981_8871327377988520849_n.jpg","youtube":"","lat":11.3621,"lng":-58.6646},{"name":"Tiger Rehabilitation & Release","country":"Russia","city":"Vladivostok","state":"","category":"TIGER","description":"There are currently between 400- 500 siberian tigers left in the wild. Primorskii Regional Non-commercial Organization (PRNCO), is the first full fledged rehabilitation center for tigers in Russia, focusing on successful treatment to regain their health, teach them to hunt and fear humans, and make their release possible and safe for both the animal and the people living in its habitat. The rehabilitation facility is in a wooded location far from human settlements and allows the tigers to be semi-free ranging with limited to no disturbance from people. Since 2012, they have rehabilitated 7 tigers, 6 of which were released back into their natural habitat. 5 of them became fully adapted to life in the wild. The first female they released went on to have 2 cubs and 2 of the other tigers released separately, formed a couple and also reproduced in the wild, proving their rehabilitation and release programme successful.","donated":5820.0,"years":"2017","website":"http://en.siberian-tiger.ru/","organization":"PRNCO Tiger Center/Phoenix Fund","photo":"https://zeemapsimages.s3.amazonaws.com/646645c4122e556b8e5bad6c0ba128e4-That-Moment-6_Web.jpg","youtube":"","lat":59.2974,"lng":103.0322},{"name":"Pallas Cats in Manang Valley","country":"Nepal","city":"Manang","state":"","category":"PALLAS CAT","description":"This project addresses threats to Pallas Cats in the Manang Valley in Nepal, the only place in Nepal known to have a population of Pallas Cats .","donated":2000.0,"years":"2017","website":"","organization":"Small Wildcat Conservation Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/c8834e93da0d4d1c887f5d55675f6f9d-1200px-Manoel.jpg","youtube":"","lat":29.4673,"lng":81.4541},{"name":"Fishing Cats in India","country":"India","city":"","state":"","category":"FISHING CAT","description":"This project aims to assess the relationship between fishing cats and the habitat, as well as to raise awareness about the conservation of both the cat and the habitat.","donated":11000.0,"years":"2017","website":"","organization":"Small Wildcat Conservation Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/62c1840ac75d781fd75be22440cb3f99-fishing-cat.jpg","youtube":"","lat":21.5218,"lng":77.4312},{"name":"Persian Leopard Conservation","country":"Armenia","city":"","state":"","category":"LEOPARD","description":"One of the world\u2019s lesser known biodiversity hotspots, the Caucasus covers an area of more than 500,000 sq km between the Caspian Sea and the Black Sea, and includes parts of Georgia, Armenia, Azerbaijan, Russia, Iran and Turkey. The region is home to a wealth of wildlife \u2013 including the Caucasian Leopard, and has a high level of endemism, meaning many of the species that live here are found nowhere else on Earth. Uncontrolled hunting and poaching is a serious issue throughout Armenia: killing extremely rare species bolsters standing with the community, while also fetching a high price on the black market. World Lands Trust played part in establishing the Caucasus Wildlife Refuge, a protected area for wildlife, bordering the 60,000 acre Khosrov State Reserve, a national park in Armenia. The refuge and all its wildlife is protected with a small but dedicated team of rangers who is supported by World Lands Trust Keepers of the Wild programme. World Lands Trust is funding land purchase to extend the 10,000 acre (4,000 hectare) Caucasus Wildlife Refuge, develop a caucasian mountain corridor and strengthen the ranger team to tackle illegal hunting within the region.","donated":1000.0,"years":"2017","website":"http://www.worldlandtrust.org/projects/armenia","organization":"World Lands Trust","photo":"https://zeemapsimages.s3.amazonaws.com/704fffffe93c7fd37531c2e64849ae28-caucasus-leopard-misad-dreamstime.jpg","youtube":"","lat":41.1095,"lng":47.4543},{"name":"Corridors for Jaguars","country":"Belize","city":"","state":"","category":"JAGUAR","description":"Panthera is working to preserve the genetic integrity and future of the jaguar by connecting and protecting core jaguar populations. They are working in key Jaguar habitat including Argentina, Belize, Bolivia, Brazil, Colombia, Costa Rica, Guatemala, Guyana, Honduras, Mexico, Nicaragua, Panama, and Venezuela","donated":1523.0,"years":"2013","website":"","organization":"Panthera","photo":"https://zeemapsimages.s3.amazonaws.com/5ad49608720f07caf61e21be30add027-jaguar-1310184-1.jpg","youtube":"","lat":18.6077,"lng":-87.3614},{"name":"Snow Leopard Collar Study","country":"Mongolia","city":"","state":"","category":"SNOW LEOPARD","description":"The Snow Leopard Trust uses cutting edge research tools to determine where their efforts are needed the most. The information collected is used to improve the community-based conservation programs that protect snow leopards living in the five countries where they work. Snow Leopard Trust field researchers conduct studies year round to gain insight about snow leopard habitat, wild prey species, and the cats themselves. Research cameras photograph wild snow leopards as they move throughout their home ranges, while GPS collars provide us the opportunity to track an individual snow leopard\u2019s movements for an entire year. Ecological surveys are used to better understand the landscape and the role of humans and wildlife alike, and genetics research offers the chance to establish a snow leopard population\u2019s health and diversity. Big Cat Rescue donated to fund a GPS collar for a female Snow Leopard Khashaa","donated":6000.0,"years":"2011, 2018","website":"https://www.snowleopard.org/our-work/research/research-tools/#gps","organization":"Snow Leopard Trust","photo":"https://zeemapsimages.s3.amazonaws.com/b194f156639a6980e2c0248aea7a3bbc-collaring-website.jpg","youtube":"","lat":48.4227,"lng":103.4402},{"name":"Lion Landscapes","country":"Kenya","city":"","state":"Laikipia County","category":"LION","description":"Lion Landscapes is a non profit organisation dedicated to lion conservation in Africa. Working on issues such as human-animal conflict, Lion Landscapes are developing the best practices to allow human and lions to coexist. Long term research in the area has shown that conflict between lions and people can be effectively managed by collaring and monitoring lion movements, and giving livestock owners access to real time lion movement data. This allows livestock owners to be proactive and keep their livestock away from lions, or increase their protection of livestock when close to lions. One adult lioness in each pride, and one adult male in each male coalition is collared with a GPS collar that sends us hourly locations for the lion. Access to lion movement data is given to livestock owners that maps the lion locations on google earth. Even if livestock owners don\u2019t have the same technology as all of us, almost all of them have access to smartphones and a cell network. In addition to the data from the GPS collars, Lion Landscapes has developed a predator system. This system responds to chips in the lion\u2019s collar by setting off alarms and lights when the collared lion approaches livestock within a certain distance.The harmless deterrents used (lights and alarms) often stop a lion attacking on their own but the system also ensures that human boma guards are awake and ready for the lion when it arrives.","donated":1000.0,"years":"2018","website":"https://www.lionlandscapes.org/collaring-for-coexistence","organization":"Lion Landscapes","photo":"https://zeemapsimages.s3.amazonaws.com/8445838329a55cf8230d32783db91204-16463838_1852542075034207_1630485724564186836_o.jpg","youtube":"","lat":0.3402,"lng":34.0487},{"name":"Furs for life","country":"South Africa","city":"Inanda","state":"KwaZulu-Natal","category":"LEOPARD","description":"The leopard is likely the most persecuted large cat in the world. Extinct in six countries and possibly extinct in six additional countries, leopards have vanished from at least 49 percent of their historic range in Africa and 84 percent of their historic range in Eurasia. The species is threatened by illegal killing for their skins and other body parts used for ceremonial regalia, conflict with local people, rampant bushmeat poaching, and poorly managed trophy hunting. In southern Africa, as many as 2,500 leopards are killed each year for their skins. With fewer than 5,000 leopard remaining in South Africa, this illegal killing poses a significant threat to their survival. Many leopards are killed so their skins can be used by local religious groups, such as the Shembe, for ceremonial garb. Leopard furs are a crucial element of traditional dress during the Shembe Festival, an annual gathering of Shembe members. After discovering that as many as 15,000 illegal leopard skins were being used, Panthera initiated the Furs for Life Leopard Project in 2013. Working with digital designers, Panthera created high-quality and affordable faux leopard skin capes. More than 14,000 capes have already been donated and another 4,000 are set to be distributed by 2018. The Faux skins are gaining increasing acceptance as viable alternatives to real leopard skins. Panthera\u2019s research has indicated that the use of real skins has already decreased by 50% preventing hundreds of Leopard deaths each year.","donated":1000.0,"years":"2018","website":"https://www.panthera.org/furs-for-life","organization":"Panthera","photo":"https://zeemapsimages.s3.amazonaws.com/ddbe722261e59c43bdeaa772f844177c-24130510_10155218208383763_8993281342641154859_o.jpg","youtube":"","lat":-31.5657,"lng":21.6992},{"name":"Living with Lions","country":"United States","city":"Sonoma","state":"California","category":"COUGAR","description":"Audubon Canyon Ranch is a 501(c)(3) not-for-profit environmental conservation and education organization, founded in 1962. Today, Audubon Canyon Ranch acts as guardian of a system of nature preserves spanning 26 properties in California. ACR works to improve global environmental health by conserving and stewarding valuable natural resources, managing for ecological resilience, providing scientific solutions to ecosystem management, and teaching generations of conservationists in ways that strengthen natural and human communities. Living with Lions is a community-based mountain lion research and education project in the Mayacamas Mountains of Sonoma and Napa Counties that will increase scientific and public understanding of mountain lions, identify priority habitat areas for conservation, and increase appreciation for these important top predators. By expanding their knowledge of mountain lion behavior, population size, feeding habits, home range, and movements, ACR can contribute to their conservation and the protection of the habitat critical for mountain lion survival while minimizing conflict with humans. ACR\u2019s principal investigator on the Project is Dr. Quinton Martins, a leading expert on large mountain cats and a skilled predator trapper. Together with a team of ACR staff and advisors, Dr. Martins is studying the movement of mountain lions fitted with GPS collars within a study area that encompasses approximately 1,000 square miles, primarily in the Mayacamas Mountains (areas east of Highway 101 and west of 29) in Sonoma and Napa Counties. Living with Lions will lead to a better understanding of mountain lion ecology, connectivity in this fragmented landscape, and identification of priority areas for conservation. ACR believes that conservation is successful when people feel personally connected to nature. Mountain lions are such an iconic and charismatic species, inspiring awe, curiosity, and sometimes fear in a way that few other animals do. Through cutting-edge research, ACR continues to lead regional conservation and, through a greater understanding and appreciation of our natural world, create a better environment for all communities.","donated":1000.0,"years":"2018","website":"https://egret.org/living-with-lions","organization":"Audobon Canyon Ranch","photo":"https://zeemapsimages.s3.amazonaws.com/3845e6780aa7d9306cc4e694232e3638-1486674_1107290485958204_1415222838528472820_n.jpg","youtube":"","lat":38.2742,"lng":-97.5165},{"name":"Carnivore Trade Project","country":"South Africa","city":"Johannesburg","state":"Gauteng","category":"LION","description":"The Endangered Wildlife Trust (EWT) is a registered 501(c)3 Non Profit Organisation dedicated to conserving threatened species and ecosystems in southern Africa. Carnivores are traded both as living and dead specimens e.g. Leopards are traded for hunting trophies, cheetahs as exotic pets and lions for photo props/canned hunts. Trade needs to be well regulated to ensure that it does not impact negatively on the survival of the species. In South Africa it has been shown that the regulation and policing of trade in carnivores is inefficient and that in many cases trade is detrimental to the survival of the species. The Carnivore Trade project focuses aims to change this through monitoring, regulation, awareness and training.","donated":1000.0,"years":"2018","website":"https://www.ewt.org.za/CCP/ccp.html","organization":"Endangered Wildlife Trust","photo":"https://zeemapsimages.s3.amazonaws.com/96c09da351bb106b8d53f227cb796e47-ewt-806x403-3139177384.jpg","youtube":"","lat":-24.8258,"lng":28.994},{"name":"Wildlife Corridors","country":"United States","city":"Pasadena","state":"California","category":"COUGAR","description":"The Arroyos & Foothills Conservancy is a 501(c) 3 nonprofit organization dedicated to preserving land, protecting natural areas for birds and wildlife and providing access and education to their local communities. Disruption of landscape connections for species movements and range changes is one of the greatest stressors to ecosystems. Movement is essential to species survival, whether it be day-to-day movement of individuals seeking food, shelter or mates, juvenile dispersal, seasonal migration or recolonization after a local population is eliminated. Maintaining and enhancing connectivity is essential to support ecosystem functions, such as predator-prey relationships and gene flow.","donated":1000.0,"years":"2018","website":"http://www.arroyosfoothills.org","organization":"Arroyos & Foothills Conservancy","photo":"https://zeemapsimages.s3.amazonaws.com/836a10784c8a18109ef2e549d638c4ef-IA6YZGPEAJHKXPY6W2G3NYNVUE.jpg","youtube":"","lat":35.2986,"lng":-95.0323},{"name":"Guardians of the Wild","country":"India","city":"Mumbai","state":"","category":"TIGER","description":"The International Fund for Animal Welfare (IFAW) and Wildlife Trust of India (WTI) initiated the Guardians of the Wild Project in 2001, with the goal of assisting the government in creating a strong, well-equipped and motivated force of frontline rangers, to curb poaching and habitat degradation in key tiger habitats. As few as 3,000 tigers survive in the wild. The few tigers that do remain live in vast inaccessible forests protected by forest and park rangers who often lack proper training and equipment, and who are outmanned and outgunned by gangs of poachers seeking to kill wild tigers and sell their skins and parts on the black market. The Guardians of the wild project has a multi-pronged strategy abbreviated as TEAM, which stands for Training, Equipment, Awareness and Morale Boosting. In Collaboration with India\u2019s state forest department, the project provides rangers with in-depth training in the basics of investigation, preparing and filing legal cases against offenders, current threats to wildlife and human- wildlife conflicts, and crime prevention techniques. Upon successful completion of the program, personnel are given kits to help them in field work. The kits are assembled based on the needs of the field work area. Since the project was introduced, over 16,000 forest personnel have been trained and equipped, in more than 150 protected areas across India.","donated":1000.0,"years":"2018","website":"http://www.wti.org.in/projects/wildlife-crime-control-division/","organization":"Wildlife Trust India/IFAW","photo":"https://zeemapsimages.s3.amazonaws.com/8dc8b27b6a66a6c2000a6e8104cd1169-Insitu-Guardians-IFAW-0409_o.jpg","youtube":"","lat":22.1948,"lng":79.4102},{"name":"Freeland Foundation","country":"Thailand","city":"","state":"","category":"TIGER","description":"The Freeland Foundation is a Non-profit 501(c)3 Organization providing frontline counter-trafficking, to combat illegal poachers and sales within the wildlife trade. Located in Thailand, their main focus is tiger poaching and taking down active tiger poaching groups. In 2025: Funding supports Freeland's frontline work to form, train and network wildlife protection task forces in Asia, Africa and Latin America. With the loss of the 78% of their funding that came from USAID and the State Department, this donation helps them continue to operate through the end of the year as they continue their efforts to replace the government funding with private sources.","donated":88000.0,"years":"2018, 2019, 2022, 2025","website":"https://www.freeland.org","organization":"Freeland Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/b97b93e89cab60288bd8f75e65cf6126-0694a352aa60a91468aedeb004c98cc6-41807092_10160804685585641_8940824795788869632_o.jpg","youtube":"K1AWJnVOsog","lat":15.7759,"lng":102.0661},{"name":"Super Sniffers","country":"India","city":"","state":"Bihar","category":"TIGER","description":"The illegal wildlife trade is a rapid growing global industry, run by highly organized criminal networks, with an estimated worth of $19 billion per year. India plays a significant role in this illegal network, particularly as a source of tiger bones, used traditionally for Chinese medicine, and tiger skins, that command a high price on the international market. Illegal trade is often perceived as a lower risk Illegal activity by poachers and traders but puts the population of Indian tigers at high risk. Since 2008, TRAFFIC, the wildlife trade and monitoring network, and the World Wildlife Fund (WWF), have embarked on an important journey to help raise and train sniffer dog squads to strengthen anti-poaching and anti-trafficking measures, of forest departments and other enforcement agencies, concerned with wildlife protection in India. Dogs have an extraordinary sense of smell that is almost one thousand times more sensitive than a humans, often giving them the ability to discriminate between the faintest odors and detect smells from both living species and raw materials, despite smugglers efforts to mask them. The dogs not only increase efficiency and detect hard-to-find substances but their presence also provides a strong deterrent to traffickers and helps raise awareness in the public about the illegal wildlife trade. Sniffer dogs are often employed at airports, shipping ports, transport centers and national parks, working alongside trained handlers, to quickly scan cargo, luggage, packaging, vehicles or desired areas for illegal contraband. The dogs undergo grueling training to be able to detect not only wildlife products, but to also locate animals that have sustained injuries, which helps authorities get hold of poachers swiftly. Once trained the dogs, popularly known as \"Super Sniffers\", are deployed into one of seven states in India that are home to large tiger populations.","donated":5000.0,"years":"2018","website":"https://support.wwfindia.org/super_sniffer/index.php","organization":"WWF/TRAFFIC","photo":"https://zeemapsimages.s3.amazonaws.com/faeb0ab74ffef91f2a5a91f9ea57271f-unnamed.jpg","youtube":"","lat":20.4008,"lng":81.4247},{"name":"OSA Conservation","country":"Costa Rica","city":"","state":"","category":"OCELOT","description":"Founded in 2003, Osa Conservation is a nonprofit organization dedicated to protecting globally significant biodiversity of the Osa Peninsula, in Costa Rica, through the implementation of ecosystem stewardship, enhancing scientific understanding, providing education and training, and creating sustainable economic opportunities. Osa is one of the last landscapes in Central America that can still sustain five species of wild cats in the region: Margay, Ocelot, Jaguarundi, Cougar and Jaguar. The incredible region of the Osa, with its intense diversity and endemism is at risk, with old forest growth declining, putting pressure on biodiversity, as the forests become increasingly fragmented and degraded. Within the Osa forest, these cats face threats from habitat fragmentation, decrease of natural prey and increasing conflicts with humans and livestock. In 1999 the Osa was declared one of ninety \u201cJaguar Conservation Sites\u201d of the world and one of the most important places for conservation of this species, which is critically endangered in Costa Rica. To better understand the conservation needs of wild cats and their prey, Osa Conservation initiated the Camera Trap Network for the Osa Peninsula in collaboration with National University of Costa Rica (UNA). This monitoring program is comprised of camera traps placed on properties throughout the Osa Peninsula- ranging from Corcovado National Park, local eco-lodges, private landowners and Osa Conservation properties and Piedras Blancas National Park. As part of the Osa Camera Trap Network, the cameras are placed in areas with high probability of cat presence. They take pictures based on a motion sensor so every time an animal passes by photographic evidence is obtained that we can be used to learn about population trends. The aim of the Camera Traps was to identify the key priority conservation areas in addition to estimating the current density of Jaguar in the Osa Peninsula, estimating abundance of terrestrial mammals among the different protected areas in the Osa Peninsula, Identifying anthropogenic and environmental factors affecting the distribution and abundance of terrestrial mammals in the Osa Peninsula and evaluating the biological corridors in the Osa Peninsula.","donated":1000.0,"years":"2018","website":"http://osaconservation.org/projects/wildlife/osa-camera-trap-network/","organization":"OSA Conservation","photo":"https://zeemapsimages.s3.amazonaws.com/7f2f13f18ee55244a89130c99cfd8c15-Insitu-Osa-Nature_31533552672287702_n.jpg","youtube":"","lat":9.7192,"lng":-86.5159},{"name":"Gorongosa Lion Project","country":"Mozambique","city":"","state":"","category":"LION","description":"Gorongosa National Park is mozambique\u2019s flagship national park, encompassing 4,067 sq.km and acting as a hub for ecotourism, scientific research, conservation and community engagement. After preliminary exploration it is one of the most beautiful and biodiverse landscapes in Africa, thanks to its varied terrain, richness of its soil and variety of different ecosystems. Within this park is the Gorongosa Lion Project, a long-term recovery and conservation of lions in the Gorongosa-Marromeu Lion Ecosystem.","donated":1000.0,"years":"2018","website":"http://www.lions.gorongosa.org","organization":"Gorongosa Lion Project","photo":"https://zeemapsimages.s3.amazonaws.com/8d0bc079bc9a11c4b4a3b1f8423b7992-11160626_906598906029582_8712278481580122675_o.jpg","youtube":"","lat":-21.5226,"lng":34.1216},{"name":"Northern Jaguar Project","country":"Mexico","city":"","state":"","category":"JAGUAR","description":"The Northern Jaguar Project is a bi-national non-profit organization initiated by conservationists from Arizona and Mexico, with the aim of preserving core Jaguar populations and essential Jaguar habitat through the establishment, care and expansion of protected areas in the Northern Sonoran Desert in Mexico and the southwestern United States. Their aspiration is to restore habitat suitable for Jaguars and other threatened and endangered species, support wildlife research and educational programs, and to reduce conflicts between carnivores and humans.","donated":3500.0,"years":"2018, 2020","website":"https://www.northernjaguarproject.org","organization":"Northern Jaguar Project","photo":"https://zeemapsimages.s3.amazonaws.com/aa9a07328d0e6d2b51c3f9e9693891be-2d1375bbdea6db2585dcfe83e94efdd3-caza-pavos_-27-feb_.jpg","youtube":"","lat":23.0504,"lng":-101.0156},{"name":"Sri Lankan Carnivore Project","country":"Sri Lanka","city":"","state":"","category":"LEOPARD","description":"SLWCS has partnered with the Society for the Preservation of Endangered Carnivores & their International Ecological Study, to uncover the world of Sri Lanka\u2019s medium-large carnivore communities. Work is currently underway to evaluate the status of seven carnivore species, including one greater and 3 smaller felines, the leopard, rusty-spotted cat, fishing cat and jungle cat. The teams work includes updating the population and conservation status of the Sri Lankan Leopard, an IUCN \u201cEndangered\u201d species and thus a high priority species for conservation in the country. Compared to other Leopard species in Asia and Africa, the Sri Lankan Leopard has been subject to few rigorous surveys and field investigations.","donated":3500.0,"years":"2018","website":"https://www.slwcs.org/carnivore-project","organization":"Sri Lanka Wildlife Conservation Society (SLWCS)/Anthony Giordano - S.P.E.C.I.E.S","photo":"https://zeemapsimages.s3.amazonaws.com/a1c1a484fd5e33669b16f479f01f39ca-10478663_890303054319155_7226579402068932809_n.jpg","youtube":"","lat":7.5184,"lng":82.2833},{"name":"Mara Predator Conservation Programme","country":"Kenya","city":"","state":"","category":"LION","description":"The Kenya Wildlife Trust is Kenya\u2019s principal predator conservation trust, focused on creating sustainable predator populations. In 2018 KWT created the Mara Predator Conservation Programme, an initiative that brought together two flagship predator conservation projects, focusing on lions and cheetah, into one long-term conservation commitment.With a focus on scientific research the Mara Predator Conservation Programme is able to identify and implement sustainable solutions to emerging conservation challenges and collect data relating to large predator population trends, predator mortality, predator dispersal, general ecology, wildlife and human behaviour, predator genetics, endocrinology and epidemiology.","donated":3500.0,"years":"2018","website":"http://www.marapredatorconservation.org","organization":"Mara Predator Conservation Programme","photo":"https://zeemapsimages.s3.amazonaws.com/da5de9e49f5963268232b0f9bac71c10-28954468_1617823788301853_1920826914859120153_o.jpg","youtube":"","lat":-3.2804,"lng":37.7169},{"name":"Santa Monica Mountains Fund","country":"United States","city":"Santa Monica","state":"California","category":"COUGAR","description":"The Santa Monica Mountains Fund is dedicated to advancing research and conservation of the mountain lions and Bobcats that call the park home. Unfortunately, their future in the park is uncertain and the Fund is actively working with park biologists to learn what is needed protect these magnificent animals. Clear evidence shows that when large predators are lost, the balance of life in an ecosystem is severely disrupted and the diversity of other plants and animals begins an accelerated decline.Human impact is the largest threat to native species, and it comes in many forms including habitat loss, conflict with wildlife, and introduction of invasive species. The Santa Monica Fund protects native species by investing in scientific research that is used to determine management and policy decisions.
