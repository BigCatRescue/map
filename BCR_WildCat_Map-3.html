 a hose that is connected to a cistern filled by a stream 1/4 mile up the mountain. Several drinkers are filled from the same catchment. The drinkers hold water without overflowing but refill when the water level drops from the cats drinking it. Having these drinkers strategically located significantly reduces roadkill because the cats do not need to cross roads to find water. Researcher: Christofer Olea","donated":5000.0,"years":"2023","website":"","organization":"Coloproject","photo":"https://zeemapsimages.s3.amazonaws.com/1324b2e134600259cb15681b1e1838e4-Guigna-201-and-Lizard-Jim-Sanderson.jpg","youtube":"_Y7AqtqZu1U","lat":-37.196,"lng":-74.3078},{"name":"Guigna Protection via Audio","country":"Chile","city":"","state":"","category":"GUIGNA","description":"One of the biggest challenges to wild cats is conflict with resident human populations, particularly when the cats prey on livestock. This project aims to test a device which plays dog and human sounds as an auditory repellent to deter guigna from approaching backyard poultry. Specifically, each auditory device connected to a trail camera in video mode will be placed in a sampling station with available food. Guignas approaching the station will be faced with human, dog and control sounds and their behavior will be recorded during 30 seconds. In order to understand if specific sounds increase risk perception of guignas, the researchers will measure the following behaviors: visitation rate, flight response (goes away), time spent on vigilance and foraging while recorded at the station. They will analyze changes in the risk perception of guignas comparing the different sounds. If proven successful, this method will be a new low-cost effective non-lethal technique to reduce human-carnivore conflicts, applied specifically for guigna conservation.","donated":5983.0,"years":"2023","website":"","organization":"Carolina Susana Ugarte","photo":"https://zeemapsimages.s3.amazonaws.com/8e52121eec177f1ffb02dfe34b6954c4-Guigna-Jim-Sanderson-Edited-ZeeMap.jpg","youtube":"","lat":-37.4087,"lng":-70.5148},{"name":"Clouded Leopard Working Group","country":"Nepal","city":"Mahalaxmi","state":"Bagmati Province","category":"CLOUDED LEOPARD","description":"2024 Vaccinate and neuter/spay feral dogs to reduce spread of disease to the wild cats while building community conservation awareness. 2023 Fire Control This project initiates Clouded leopard conservation in the adjacent forests of Kathmandu valley. Goals are: 1. To sensitize at least 5000 vistors/tourists of national park and surrounding forests on the importance of clouded leopard and its habitat through hoarding boards (billboards) and pamphlets. 2. Conduct conservation coaching classes in the schools, local organizations, community forest user groups and army personnel on the threat mitigation strategies of clouded leopard. 3. Establish forest fire control mechanism (awareness, forest fire control tools distribution and fire line construction) in the forested habitat of clouded leopard. Researcher: Dikpal Krishna Karmacharya","donated":11900.0,"years":"2023, 2024","website":"http://cloudedleopardpartners.org/","organization":"Clouded Leopard Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/1a0657a9c6f8d9d32e6b56a70c1bf5ca-CloudedLeopard-AI-2023-09-16-5.jpeg","youtube":"RzdK9TO3bac","lat":27.3315,"lng":86.8998},{"name":"Asiatic Golden Cat","country":"Nepal","city":"Tamaphok","state":"Koshi Province","category":"GOLDEN CAT","description":"This project is to install 20 suitable predator proof goat corrals, to support the establishment of 25 greenhouses to reduce poaching, to train communities in fire fighting and to reach out to children for conservation awareness. The goat corrals avoid the \"revenge killings\" of the cats that occur when cats prey on livestock. The greenhouses provide alternative sources of income to local residents in return for commitments not to poach cats for income. Forest fire is one of the biggest threats for this species and other wildlife and their habitat in this Tinjure-Milke-Jaljale Area.","donated":7000.0,"years":"2023","website":"http://cloudedleopardpartners.org/","organization":"Clouded Leopard Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/c6b788f771d244e47bc87ea2d8530880-AsiaticgoldencatcameratrapJeremyHolden-Jim-Sanderson.jpg","youtube":"RzdK9TO3bac","lat":29.5982,"lng":83.1895},{"name":"Water for Margay & Jaguarundi","country":"El Salvador","city":"","state":"","category":"MARGAY","description":"Objectives: (1) We prioritized the strategic installation of 25 water troughs to protect the Margay and Jaguarundi in San Pedro Nonualco, ensuring a constant supply of water and significantly reducing the deaths from collisions and other risks faced by these two species and their prey during dry seasons. (2) We remain committed to restoring the habitats of these species, including restoring degraded forests and mitigating human threats. (3) It is essential to maintain education and awareness campaigns in the local communities that share their environment with these species. These actions are key to promoting harmony between humans and wildlife, ensuring the survival and conservation of both the Margay and the Jaguarundi","donated":5000.0,"years":"2023","website":"","organization":"Marvin Recinos","photo":"https://zeemapsimages.s3.amazonaws.com/eb7b396ed3b817526f709b515c4f0f11-margaydrinkingfromafountainintheforest.png","youtube":"","lat":12.1859,"lng":-89.6118},{"name":"Water for Margay and Jaguarundi","country":"El Salvador","city":"","state":"","category":"MARGAY","description":"Objectives: (1) We prioritized the strategic installation of 25 water troughs to protect the Margay and Jaguarundi in San Pedro Nonualco, ensuring a constant supply of water and significantly reducing the deaths from collisions and other risks faced by these two species and their prey during dry seasons. (2) We remain committed to restoring the habitats of these species, including restoring degraded forests and mitigating human threats. (3) It is essential to maintain education and awareness campaigns in the local communities that share their environment with these species. These actions are key to promoting harmony between humans and wildlife, ensuring the survival and conservation of both the Margay and the Jaguarundi","donated":5000.0,"years":"2023","website":"","organization":"SWCCF Marvin Recinos","photo":"https://zeemapsimages.s3.amazonaws.com/decb0c3df47119d2d34a2c9b06fb6282-margaydrinkingfromafountainintheforest.png","youtube":"","lat":15.6422,"lng":-88.4159},{"name":"Saving Oncilla AKA Norther Tiger Cat","country":"Costa Rica","city":"","state":"","category":"ONCILLA","description":"2024 Combination of (1) providing materials to build predator proof chicken coops to eliminate human/cat conflict, (2) vaccinating and spay/neuter of free roaming domestic feral and owned dogs to reduce the spread of carnivore distemper virus to wild cats, and (3) educating local residents to foster positive attitudes toward the cats and support for their conservation. 2023 Working with our partners at SWCCF and Jos\u00e9 Daniel Ram\u00edrez-Fern\u00e1ndez our objectives were: 1. Understand and assess the situation and the threat posed by free-ranging dogs and cats to small wild cats in communities around the Monteverde Cloud Forest Reserve. 2. Implement vaccination of dogs and cats to reduce wildlife disease transmission potential in the region. 3. Implement a communication campaign on small wild cat conservation and the results obtained, and to promote responsible pet ownership among neighbours of the Monteverde Cloud Forest Reserve.","donated":10000.0,"years":"2023, 2024","website":"","organization":"SWCCF Jos\u00e9 Daniel Ram\u00edrez-Fern\u00e1ndez","photo":"https://zeemapsimages.s3.amazonaws.com/9dfd021f316b37526f28578355c8e033-Oncilla.jpg","youtube":"","lat":7.2195,"lng":-82.7554},{"name":"Rusty Spotted Cat Stakeholders","country":"Nepal","city":"","state":"","category":"RUSTY SPOTTED CAT","description":"Working with our partners at SWCCF and Roshan Babu Adhikari our objectives were: (1) To conduct the participatory workshops with local stakeholders (communities, park/forest authorities, road departments, traffic police offices); (2) To install road sign-posts in highway and accessories road network in project site; (3) To build predator-proof chicken houses for the local farmers.","donated":6000.0,"years":"2023","website":"","organization":"SWCCF and Roshan Babu Adhikari","photo":"https://zeemapsimages.s3.amazonaws.com/c034ee68809dbc0a575b636a8c55243e-rustyspottedcat.png","youtube":"","lat":25.7343,"lng":85.2973},{"name":"Southern Tiger Cat","country":"Brazil","city":"","state":"","category":"TIGER CAT","description":"Working with our partners SWCCF and Vinicius de Morais our objectives were: (1) vaccinate domestic dogs and cats with access to protected area to reduce the chances of disease transmission to wildlife. (2) neuter domestic dogs and cats to reduce population size and eliminate the abandonment of domestic animals. (3) install signs on roads to warn of the risk of running over wild animals. (4) converting poorly made chicken coops into enclosures against wild predation. (5) identify and segregate contaminated domestic dogs and cats to slow the spread of disease.","donated":4500.0,"years":"2023","website":"","organization":"SWCCF and Vinicius de Morais","photo":"https://zeemapsimages.s3.amazonaws.com/a6a993b0b5bbbf39ded3017011e54dea-northertigercat.png","youtube":"","lat":-16.6345,"lng":-51.1726},{"name":"Corbett Foundation","country":"India","city":"Ranthambor Road Area","state":"","category":"TIGER","description":"2024 Solar Lighting Tigers avoid lighted areas at night. This project reduces human-carnivore conflict that results in killing of offending tigers by placing solar powered street lights around the permiter of camps. 2023 Tiger Solar Powered Wells for Watering Holes FUNDS FROM INTL TIGER DAY. Working with the Corbett Foundation to save tigers from thirst. One of the biggest threats to tigers is conflict with humans who live in areas neighboring the tiger territory. In this region, climate change has resulted in more erratic monsoons. This has affected the natural rivers and streams. In the dry season, they dry up more quickly than they used to. Thirst causes the tigers to enter the more populated areas they would normally avoid in search of water. This creates a danger to the people and killing of tigers. Corbett Foundation has a very clever solution: solar powered pumps connected to \u201cbore-wells\u201d to create watering holes for the animals. The wells are made by using a machine to drive pipe 100 to 300 feet into the ground to reach the water level. An array of six 3\u2019 x 6\u2019 solar panels is installed to operate the pump. A chain link fence is erected around the solar array to protect it. The Forest Department constructs the pool that holds the water. The well, pump, solar panels, and the labor to install these costs $4800 for each well. 2025: For International Tiger Day funds were raised for two projects. One is solar powered street lights around villlages to deter tiger attacks on humans at night. The other is removal of invasive Lantana plants from tiger preserves where the plants are crowding out the local vegetation that herbivore tiger prey rely only, reducing the prey base and making it more difficult for mother tigers to find enough to eat to support themselves and their cubs.","donated":91165.0,"years":"2023, 2024, 2025","website":"","organization":"Corbett Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/7e63ef1c93dad9879b8b670f3b2f1c11-Tiger-Dutchess-ZBCR-9561.jpg","youtube":"0axC7VyihIU","lat":19.3566,"lng":78.8335},{"name":"African Wildcat - Alley Cat Rescue","country":"South Africa","city":"","state":"","category":"SMALL CATS","description":"Funding Alley Cat Rescue\u2019s vital work to save the African wildcat, the majestic ancestor of our beloved domestic cats. Thanks to the generosity of our incredible supporters, for their spay/neuter programs for free-roaming domestic cats\u2014programs that are critical to reducing hybridization and safeguarding the wild legacy of the African wildcat. Alley Cat Rescue is dedicated to protecting these elusive wildcats, whose future is at risk due to interbreeding with domestic cats. This hybridization poses a real danger to the genetic integrity of the wild population. But there\u2019s hope! Through their innovative Trap-Neuter-Return (TNR) program, Alley Cat Rescue is addressing this issue head-on. They focus on sterilizing domestic and stray cats near game reserves like Kruger National Park, where the overlap between the two populations is most pronounced. Since this program began, over 11,000 domestic cats have been sterilized! This not only helps to keep the African wildcat\u2019s bloodline pure but also promotes healthier, happier lives for the domestic cats themselves. Proper veterinary care for free-roaming cats reduces disease, prevents overpopulation, and creates a win-win for both domestic and wild feline populations. But their work doesn\u2019t stop there. Alley Cat Rescue collaborates with scientists to study the genetics and behavior of the African wildcat, exploring ways to manage and protect these wild cats more effectively. Public awareness is also a key part of their mission. In 2021, they launched the African Wildcat Project Facebook page, where they invite cat lovers and conservation enthusiasts to report sightings of these shy felines in the wild. Every sighting adds to a growing database, helping to map out the species' distribution and shape future conservation strategies. By supporting Alley Cat Rescue, you\u2019re not just helping to preserve the African wildcat\u2014you\u2019re ensuring a brighter future for domestic cats as well. Together, we can protect the wild heritage of all cats, fostering a world where big cats, small cats, and every cat in between can live and thrive. Let\u2019s celebrate this important step forward as we continue our mission to protect wild cats in the wild\u2014where they belong. Visit Alley Cat Rescue at http://www.saveacat.org/awc-conservation-projects.html","donated":30000.0,"years":"2025, 2026","website":"http://www.saveacat.org/","organization":"Alley Cat Rescue","photo":"https://zeemapsimages.s3.amazonaws.com/92d9bd125dcbb0aea04ca131a38ebd1a-Asianwildcat-Jim-Sanderson.jpg","youtube":"","lat":-31.4302,"lng":20.1164},{"name":"Blink+A","country":"Peru","city":"","state":"","category":"SMALL CATS","description":"The Solution: Blink+A Carnivore Deterrent Blink+A is a state-of-the-art deterrent system that integrates light and sound technology to discourage carnivores from approaching livestock and other areas of human activity. The device has been meticulously designed to be: Affordable and Easy-to-Use: Accessible for ranchers and conservation practitioners alike. Versatile: Suitable for different environments and adaptable to various species. Durable and Weatherproof: Built to withstand challenging conditions. Solar-Powered: Environmentally friendly and sustainable. Evolution and Features Blink+A has undergone a rigorous development process, including five official versions and five test versions. Key advancements include: Random Activation Modes: Reduces predictability and enhances effectiveness. Passive Infrared (PIR) Sensors: Automatically detect movement to activate deterrents. Operation Mode Flexibility: Users can choose from random, PIR, light, or sound modes. Device Communication: \"Hive behavior\" allows multiple units to work collaboratively. Recent Improvements and Next Steps The project has recently focused on integrating advanced Printed Circuit Board (PCB) designs, enabling seamless operation and improved efficiency. As the deterrent has already been validated in lab simulations and on the field in Patagonia, next step includes testing across diverse environments and species, beyond pumas and Patagonia. The Blink+A project continues to innovate with plans for further development and broader deployment. Our contribution has funded the production of 33 additional units to enable essential testing, development, and refinement of this crucial tool, directly supporting the coexistence of humans and wild carnivores.","donated":10000.0,"years":"2024","website":"","organization":"Blink+A Carnivore Deterrent","photo":"https://zeemapsimages.s3.amazonaws.com/a4d49ef17b55845a150d6731cc205c08-BlinkA.png","youtube":"","lat":-9.3516,"lng":-76.1211},{"name":"Instituto de Investigaciones Biol\u00f3gicas Clemente Estable","country":"Uruguay","city":"","state":"","category":"PAMPAS CAT","description":"Collaborating with schools and landowners to protect an Uruguayan pampas cat population as follows: (1) Monitoring a Uruguayan pampas cat population in the center of Uruguay. (2) Engage local schools and landowners in developing a participatory monitoring program. (3) Promote cultural appreciation of the Uruguayan pampas cat. (4) Promote strategies that allow the conservation of the pampas cat in multiple ways (exclusion zones that maintain native vegetation, construction of anti-predation chicken coops, dog control). (5) Strengthening collaborative efforts in monitoring and conserving the pampas cat between initiatives in Brazil and Uruguay.","donated":5000.0,"years":"2024","website":"","organization":"Instituto de Investigaciones Biol\u00f3gicas Clemente Estable","photo":"https://zeemapsimages.s3.amazonaws.com/251aded3ba172df52ee6f7deb9097120-PampasCatYawningDALLE2024-05-1616.20.08-APampascatyawningwhilerestinginahollowtreetrunk.Thecatshouldhaveitsmouthwideopenshowingitsteethanditseyespartiallyclosedi.webp","youtube":"","lat":-32.1026,"lng":-53.6737},{"name":"Indonesia Flat Headed Cats","country":"Indonesia","city":"","state":"","category":"FLAT HEADED CAT","description":"This project is to conduct surevy work to assess the presence and distribution of flat-headed cats in Berbak and Sembilang National Park aka BSNP which is a 202,896 hectare area that is lowland-dominated landscapes that lies between Jambi and South Sumatra Province. Most of the grant money would be spent on field work costs, including support salaries.","donated":7285.0,"years":"2024","website":"","organization":"Erwin Wilianto","photo":"https://zeemapsimages.s3.amazonaws.com/d55ebb5cdd6decf3b4871367e3554d11-Flat-headed_cat_1_Jim_Sanderson-AI.jpg","youtube":"","lat":-3.0289,"lng":111.1504},{"name":"Fauna Andina - Fernando Vidal","country":"Chile","city":"","state":"","category":"GUIGNA","description":"2025 - Funding rescue center operations that include care of captive guignas that are part of a reintroduction program and protection of both captive and wild guignas.","donated":2500.0,"years":"2025","website":"https://www.instagram.com/fauna_andina/?hl=en","organization":"Fauna Andina","photo":"https://zeemapsimages.s3.amazonaws.com/1bcc1ae16e86cf437fdb9defd3092005-AI-VersionOfSMA-Guigna-FaceBlur.jpg","youtube":"","lat":-33.8825,"lng":-69.3034},{"name":"Persia IUCN Manual","country":"Iran","city":"","state":"","category":"SMALL CATS","description":"One of the Ocelot Working Group's flagship products is the IUCN Human\u2013Wildlife Conflict and Coexistence Guidelines. They have become the most downloaded and widely used guidelines within IUCN, and are increasingly referenced internationally. Mariam and a biologist from Iran generously volunteered time to translate the guidelines into Persian at no cost. This will help species such as the Pallas\u2019s cat, snow leopard, and cheetah. Big Cat Rescue funded the $1000 for the IUCN to formally publish the Persian version with a DOI and the necessary evaluation metrics. A DOI is Digital Object Identifier, it is a permanent, unique alphanumeric code that ensures a publication can always be reliably located and cited online, even if the web address changes.","donated":1000.0,"years":"2026","website":"","organization":"Ocelot Working Group","photo":"","youtube":"","lat":33.3603,"lng":51.5426}];

  'LION':'#F4A200','TIGER':'#FF5722','LEOPARD':'#C8860A','JAGUAR':'#00BFA5',
  'COUGAR':'#A0522D','CHEETAH':'#FFD700','SNOW LEOPARD':'#64B5F6',
  'CLOUDED LEOPARD':'#AB47BC','AMUR LEOPARD':'#FDD835','FISHING CAT':'#26C6DA',
  'OCELOT':'#FF4081','MARGAY':'#FF8F00','BOBCAT':'#66BB6A','JAGUARUNDI':'#26A69A',
  'CARACAL':'#FF7043','SAND CAT':'#BCAAA4','BLACK FOOTED CAT':'#CE93D8',
  'FLAT HEADED CAT':'#00ACC1','PALLAS CAT':'#78909C','ANDEAN CAT':'#42A5F5',
  'GUIGNA':'#EF5350','PAMPAS CAT':'#D4E157','ONCILLA':'#FFAB40','TIGER CAT':'#FFA726',
  'RUSTY SPOTTED CAT':'#EC407A','MARBLED CATS':'#7E57C2','AFRICAN GOLDEN CAT':'#FFC107',
  'GOLDEN CAT':'#FFCA28','IBERIAN LYNX':'#26C6DA','CANADA LYNX':'#29B6F6',
  'JUNGLE CAT':'#9CCC65','SMALL CATS':'#9575CD','RANGERS':'#78909C',
  'GEOFFREY CAT':'#FFA000','DEFAULT':'#64B5F6'
};

function catColor(cat){return CAT_COLORS[cat]||CAT_COLORS['DEFAULT']}

// Stars background
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  for(let i=0;i<220;i++){
    const x=Math.random()*c.width,y=Math.random()*c.height,r=Math.random()*1.2+.2;
    const el=document.createElement('div');
    el.className='star';
    el.style.cssText=`left:${x}px;top:${y}px;width:${r*2}px;height:${r*2}px;opacity:${Math.random()*.7+.3};animation-duration:${Math.random()*4+2}s;animation-delay:${Math.random()*3}s`;
    document.getElementById('stars').parentNode.insertBefore(el,document.getElementById('stars').nextSibling);
  }
})();

// Build GeoJSON
const geojson = {
  type:'FeatureCollection',
  features: PROJECTS.map((p,i)=>({
    type:'Feature',
    id: i,
    geometry:{type:'Point',coordinates:[p.lng,p.lat]},
    properties:{...p, id:i}
  }))
};

// Initialize Map
const map = new maplibregl.Map({
  container:'map',
  style:'https://tiles.openfreemap.org/styles/dark',
  center:[20,15],
  zoom:1.8,
  minZoom:1,
  maxZoom:16,
  attributionControl: false
});

map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-right');

let currentFilter = null;
let popup = null;
let rotating = true;
let rotateInterval = null;

// Rotate globe slowly on load
function startRotation(){
  if(rotating){
    rotateInterval = setInterval(()=>{
      if(!map.isMoving()){
        const c = map.getCenter();
        map.easeTo({center:[c.lng+0.3, c.lat], duration:50, easing:t=>t});
      }
    },50);
  }
}

map.on('mousedown',()=>{rotating=false;if(rotateInterval)clearInterval(rotateInterval)});
map.on('touchstart',()=>{rotating=false;if(rotateInterval)clearInterval(rotateInterval)});

map.on('load',()=>{
  // Set globe projection
  try{ map.setProjection({type:'globe'}); }catch(e){}

  // Add source
  map.addSource('projects',{type:'geojson',data:geojson,cluster:true,clusterMaxZoom:6,clusterRadius:40});

  // Category color expression
  const colorExpr = ['match',['get','category']];
  Object.entries(CAT_COLORS).forEach(([k,v])=>{if(k!=='DEFAULT'){colorExpr.push(k);colorExpr.push(v);}});
  colorExpr.push(CAT_COLORS.DEFAULT);

  // Clusters
  map.addLayer({id:'clusters',type:'circle',source:'projects',filter:['has','point_count'],paint:{
    'circle-color':['step',['get','point_count'],'#37547a',5,'#F4A200',10,'#FF5722'],
    'circle-radius':['step',['get','point_count'],18,5,24,10,30],
    'circle-stroke-width':2,'circle-stroke-color':'rgba(255,255,255,.25)',
    'circle-opacity':.9
  }});

  map.addLayer({id:'cluster-count',type:'symbol',source:'projects',filter:['has','point_count'],layout:{
    'text-field':['get','point_count_abbreviated'],
    'text-font':['Noto Sans Regular'],'text-size':12
  },paint:{'text-color':'#fff'}});

  // Points
  map.addLayer({id:'points',type:'circle',source:'projects',filter:['!',['has','point_count']],paint:{
    'circle-color':colorExpr,
    'circle-radius':7,
    'circle-stroke-width':1.5,
    'circle-stroke-color':'rgba(255,255,255,.35)',
    'circle-opacity':.9
  }});

  // Build legend
  buildLegend();
  
  // Start slow rotation
  setTimeout(startRotation, 800);
  
  // Hide loading
  setTimeout(()=>{document.getElementById('loading').classList.add('fade')},600);
});

// Click clusters - zoom in
map.on('click','clusters',e=>{
  const f=map.queryRenderedFeatures(e.point,{layers:['clusters']})[0];
  map.getSource('projects').getClusterExpansionZoom(f.properties.cluster_id,(err,zoom)=>{
    if(err)return;
    map.easeTo({center:f.geometry.coordinates,zoom});
  });
});

// Click points - show detail
map.on('click','points',e=>{
  if(e.features.length===0)return;
  const props = e.features[0].properties;
  showDetail(props);
  
  // Fly to point
  map.flyTo({center:e.features[0].geometry.coordinates,zoom:Math.max(map.getZoom(),4),duration:600});
  
  // Popup
  if(popup)popup.remove();
  popup = new maplibregl.Popup({offset:12,closeButton:false})
    .setLngLat(e.features[0].geometry.coordinates)
    .setHTML(`<div class="popup-name">${props.name}</div><div class="popup-cat" style="color:${catColor(props.category)}">${props.category}</div><div class="popup-loc">📍 ${props.country}</div>`)
    .addTo(map);
});

map.on('mouseenter','points',()=>map.getCanvas().style.cursor='pointer');
map.on('mouseleave','points',()=>map.getCanvas().style.cursor='');
map.on('mouseenter','clusters',()=>map.getCanvas().style.cursor='pointer');
map.on('mouseleave','clusters',()=>map.getCanvas().style.cursor='');

function showDetail(p){
  const ph = document.getElementById('detail-photo');
  const phph = document.getElementById('detail-photo-ph');
  if(p.photo && p.photo.length>5){
    ph.src=p.photo; ph.style.display='block'; phph.style.display='none';
  } else {
    ph.style.display='none'; phph.style.display='flex';
  }
  
  const color = catColor(p.category);
  document.getElementById('detail-category').innerHTML=`<span style="background:${color}22;color:${color};border:1px solid ${color}44;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">🐾 ${p.category}</span>`;
  document.getElementById('detail-name').textContent=p.name;
  document.getElementById('donated-amount').textContent='$'+Number(p.donated).toLocaleString();
  document.getElementById('donated-years').textContent=p.years?'Funded: '+p.years:'';
  
  const loc=[p.city,p.state,p.country].filter(Boolean).join(', ');
  document.getElementById('detail-meta').innerHTML=`
    <div class="meta-row"><span class="meta-icon">📍</span><span class="meta-val">${loc||p.country}</span></div>
    ${p.organization?`<div class="meta-row"><span class="meta-icon">🏢</span><span class="meta-val">${p.organization}</span></div>`:''}
  `;
  
  const desc = p.description||'';
  document.getElementById('detail-desc').textContent = desc;
  document.getElementById('detail-org').innerHTML = p.organization?`<span style="color:var(--text3)">Organization: </span><span>${p.organization}</span>`:'';
  document.getElementById('detail-link').innerHTML = p.website&&p.website.length>3?`<a href="${p.website}" target="_blank" rel="noopener">🔗 Visit Project Website ↗</a>`:'';
  const ytDiv = document.getElementById('detail-youtube');
  if(p.youtube && p.youtube.length>3){
    ytDiv.innerHTML=`<div class="yt-label">▶ Project Video</div><a class="yt-thumb" href="https://www.youtube.com/watch?v=${p.youtube}" target="_blank" rel="noopener"><img src="https://img.youtube.com/vi/${p.youtube}/hqdefault.jpg" alt="Project video thumbnail"><div class="yt-play"><div class="yt-play-icon"></div></div></a>`;
  } else {
    ytDiv.innerHTML='';
  }
  
  document.getElementById('detail').classList.add('open');
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  if(popup)popup.remove();
}

// Legend
function buildLegend(){
  const counts={};
  PROJECTS.forEach(p=>{counts[p.category]=(counts[p.category]||0)+1});
  // Alphabetical, Rangers pinned to bottom
  const sorted=Object.entries(counts).sort((a,b)=>{
    if(a[0]==='RANGERS') return 1;
    if(b[0]==='RANGERS') return -1;
    return a[0].localeCompare(b[0]);
  });

  const container=document.getElementById('legend-items');
  sorted.forEach(([cat,count])=>{
    if(cat==='RANGERS'){
      const sep=document.createElement('div');
      sep.className='legend-section';
      sep.textContent='Support';
      container.appendChild(sep);
    }
    const color=catColor(cat);
    const el=document.createElement('div');
    el.className='legend-item';
    el.dataset.cat=cat;
    el.innerHTML=`<div class="legend-dot" style="background:${color}"></div><span class="legend-label">${cat.toLowerCase()}</span><span class="legend-count">${count}</span>`;
    el.onclick=()=>filterByCategory(cat,el);
    container.appendChild(el);
  });
}

function filterByCategory(cat,el){
  if(currentFilter===cat){filterAll();return;}
  currentFilter=cat;
  document.querySelectorAll('.legend-item').forEach(i=>i.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('btn-all').classList.add('active');
  document.getElementById('btn-all').textContent='✕ '+cat;
  document.getElementById('all-projects-btn').style.opacity='0.45';
  document.getElementById('all-projects-btn').style.fontWeight='400';
  
  const filtered={type:'FeatureCollection',features:geojson.features.filter(f=>f.properties.category===cat)};
  map.getSource('projects').setData(filtered);
  
  // Update stat
  document.getElementById('stat-projects').textContent=filtered.features.length;
  const total=filtered.features.reduce((s,f)=>s+f.properties.donated,0);
  document.getElementById('stat-donated').textContent='$'+formatMoney(total);
}

function filterAll(){
  currentFilter=null;
  document.querySelectorAll('.legend-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('btn-all').classList.remove('active');
  document.getElementById('btn-all').textContent='All Species';
  document.getElementById('all-projects-btn').style.opacity='1';
  document.getElementById('all-projects-btn').style.fontWeight='600';
  map.getSource('projects').setData(geojson);
  document.getElementById('stat-projects').textContent='146';
  document.getElementById('stat-donated').textContent='$1.56M';
}

function filterSearch(val){
  if(!val.trim()){filterAll();return;}
  const q=val.toLowerCase();
  const filtered={type:'FeatureCollection',features:geojson.features.filter(f=>{
    const p=f.properties;
    return p.name.toLowerCase().includes(q)||p.country.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)||(p.organization||'').toLowerCase().includes(q);
  })};
  currentFilter='search';
  map.getSource('projects').setData(filtered);
  document.getElementById('stat-projects').textContent=filtered.features.length;
}

function formatMoney(n){
  if(n>=1000000)return (n/1000000).toFixed(2)+'M';
  if(n>=1000)return (n/1000).toFixed(0)+'K';
  return n.toString();
}

let legendVisible=true;
function toggleLegend(){
  legendVisible=!legendVisible;
  document.getElementById('legend').classList.toggle('hidden',!legendVisible);
  document.getElementById('btn-legend').classList.toggle('active',legendVisible);
  if(legendVisible){
    document.getElementById('search-box').style.left='250px';
  } else {
    document.getElementById('search-box').style.left='20px';
  }
}

let currentView='globe';
function setView(v){
  currentView=v;
  document.getElementById('btn-globe').classList.toggle('active',v==='globe');
  document.getElementById('btn-map').classList.toggle('active',v==='mercator');
  try{map.setProjection({type:v==='globe'?'globe':'mercator'});}catch(e){}
  if(v==='globe'){
    map.setCenter([20,15]);map.setZoom(1.8);
  } else {
    map.setZoom(1.5);
  }
}
</script>
