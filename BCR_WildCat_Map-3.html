They also work to raise awareness of species protection issues to help visitors and park neighbors understand how their decisions might affect the amazing plants and animals found within the mountains.","donated":8000.0,"years":"2018, 2019","website":"https://www.samofund.org","organization":"Santa Monica Mountains Fund","photo":"https://zeemapsimages.s3.amazonaws.com/e9e8e7906bc826d67aa5e378189d392d-03d12c7e64db7f86bd04926d38cb4222-44972105_1988144544609443_5221448645768904704_o.jpg","youtube":"","lat":34.242,"lng":-97.2658},{"name":"Satpuda Landscape Tiger Programme","country":"India","city":"Nagpur","state":"Maharashtra","category":"TIGER","description":"The Satpuda Landscape Tiger Programme was established in 2005 and is the largest NGO working on tiger and habitat conservation in India. Satpuda Landscape Tiger Programme, developed by the Born Free Foundation and the Wildlife Conservation Research Unit at Oxford University, brings together a network of Indian conservationists who are working in six tiger reserves across this very important tiger range. The Satpuda forests of Madhya Pradesh and Maharashtra offer perhaps the best hope for India's remaining wild tigers. A handful of small organisations and committed conservationists work hand in hand with government officers and local communities to deliver long-term solutions for the protection of Satpuda\u2019s biodiversity, both directly protecting wildlife and addressing some of the most urgent needs of the people that live close to tigers.","donated":1000.0,"years":"2018","website":"http://savingindiastigers.org","organization":"Satpuda Landscape Tiger Programme","photo":"https://zeemapsimages.s3.amazonaws.com/99d4f432b9a36c3252534313bc543915-Screen Shot 2018-12-19 at 4.06.53 PM.png","youtube":"","lat":22.4075,"lng":81.5653},{"name":"Critical Protection for Borneo's Rainforest","country":"United States","city":"","state":"","category":"SMALL CATS","description":"The Rungan River Peat Swamp Forest is a vast mosaic of threatened peat swamp and lowland rainforest in southern Borneo. The area supports substantial populations of imperiled endemic species, including all five species of Bornean wild cats. One of these species is the elusive Borneo Bay Cat; a camera trap recorded video of the extremely rare species, one of only a few recent records. The Rungan River landscape is one of the largest regions of lowland forest in Kalimantan, Borneo, that is currently unprotected and at risk of destruction. Rainforest Trust and local partners are seeking funding to permanently designate 385,000 acres as permanent protected area.","donated":1000.0,"years":"2018","website":"https://www.rainforesttrust.org/projects/saving-a-stronghold-for-the-critically-endangered-bornean-orangutan-2/#project-solutions","organization":"Rainforest Trust","photo":"https://zeemapsimages.s3.amazonaws.com/09b8eacdfb86de2910f5b24519bf5e45-download.png","youtube":"","lat":39.5864,"lng":-95.645},{"name":"Wildlife, Rescue & De-Snaring","country":"Zambia","city":"","state":"","category":"LION","description":"Conservation South Luangwa is a non-profit community based organization committed to the conservation of local wildlife and natural resources in Zambia. Special attention needs to be given to anti-snaring patrols in South Luangwa. The park and surrounding areas face rapid encroachment from human settlement and agriculture. Human populations have more than doubled over the past twenty years and as a result, there is a high demand for protein in the form of bush meat as well as opportunistic and planned commercial hunting forays. Snaring is easy, generates high returns and presents a very low risk to the poacher. Over 10,000 snares have been removed from the bush by CSL supported scouts and more than 160 elephants, 25 lions, 20 hyenas have been immobilized and treated for snare wounds since 2005.To address this CSL has set up a specialized wild dog and lion anti-snaring team who use GPS locations provided by ZCP to determine where best to deploy effective anti-snaring patrols.","donated":5000.0,"years":"2018","website":"https://cslzambia.org/wildlife-rescue-and-desnaring/","organization":"Conservation South Luangwa","photo":"https://zeemapsimages.s3.amazonaws.com/26f90c5e8158736786cf794927bf968f-RachandMattLion.jpg","youtube":"","lat":-10.5206,"lng":26.9875},{"name":"Protected lands for Ocelots","country":"United States","city":"","state":"Texas","category":"OCELOT","description":"Located deep in the Rio Grande Valley at the southeastern tip of Texas along the Rio Grande River and the Gulf of Mexico, the 97,000-acre Laguna Atascosa National Wildlife Refuge was established in 1946. Laguna Atascosa National Wildlife Refuge is home to one of the two remaining ocelot populations in the nation, making it integral for conservation and recovery efforts for these endangered cats.","donated":2500.0,"years":"2018","website":"https://www.conservationfund.org/projects/go-zero-at-laguna-atascosa-national-wildlife-refuge","organization":"The Conservation Fund","photo":"https://zeemapsimages.s3.amazonaws.com/e0758e2e8606a0dee415be2ffc90e195-Ocelot2_USFWS.jpg","youtube":"","lat":37.3357,"lng":-94.9317},{"name":"Greater Limpopo Carnivore Program","country":"Mozambique","city":"","state":"","category":"LION","description":"The Greater Limpopo Carnivore Programme was founded in 2011, and is a conservation research programme dedicated to improving the conservation prospects for Lions, across the Greater Limpopo Transfrontier Conservation Area, in Mozambique. The Greater Limpopo Transfrontier Conservation Area is listed by IUCN as one of Africa\u2019s most important conservation areas and is one of only 10 remaining \u2018lion strongholds\u2019 on the continent.","donated":1000.0,"years":"2019","website":"https://www.greaterlimpopocarnivores.org/","organization":"Greater Limpopo Carnivore Programme","photo":"https://zeemapsimages.s3.amazonaws.com/2af3cd997474172620bca35e29442472-46516295_1905778219499852_2868487470201176064_o.jpg","youtube":"","lat":-18.4176,"lng":35.2091},{"name":"Conserving Bhutans Mountain Tigers","country":"Bhutan","city":"","state":"","category":"TIGER","description":"This project is a long-term initiative to build a sound knowledge base to guide tiger conservation. The tiger is an apex predator and an umbrella species: ensuring their survival allows many species they need and live with to flourish in its large shared habitat. A population baseline for Bhutan\u2019s mountain tigers is an important metric to help measure conservation success. It also allows conservationists to understand the spatial layout of important tiger habitat in order to better guide their protection.","donated":1000.0,"years":"2019","website":"https://bhutanfound.org/projects/conserving-bhutans-mountain-tigers/","organization":"Bhutan Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/e966de13041e3ed179ee2fa42bd6a1b3-30443445_10156206026007456_3285227824809508864_n.jpg","youtube":"","lat":26.778,"lng":87.5932},{"name":"Saving a Species from Extinction","country":"Russia","city":"","state":"","category":"AMUR LEOPARD","description":"The Phoenix Fund implemented an initiative, that will provide a highly skilled, mobile, law enforcement team with essential equipment and daily allowance for regular anti-poaching patrols to be conducted in Amur Leopard territories. The team works to not only protect the Amur Leopard but to protect the ecosystems of the forest in which they live. The aim is that the initiative will reduce poaching through strengthening law enforcement, habitat protection, improving data collection, nature protection legislation, educating the public, and engaging local communities in conservation efforts.","donated":1000.0,"years":"2019","website":"https://fundphoenix.org/en/","organization":"Phoenix Fund","photo":"https://zeemapsimages.s3.amazonaws.com/81c514ed0a4e8c5bcf0fc580a13e2615-7ll_Large.jpg","youtube":"","lat":61.2397,"lng":103.6366},{"name":"African Impact Foundation","country":"South Africa","city":"Ehlanzeni","state":"Mpumalanga","category":"LEOPARD","description":"Populations of large carnivores are threatened across the globe and a significant number are experiencing population decline, due to threats from habitat loss and poaching to sale through the illegal wildlife trade. Over a third of South Africa\u2019s leopard habitat is found in the Limpopo province, yet 95% of leopards in the area, are found outside of formally protected areas. Despite this, the majority of population and conservation-based research has occurred inside of protected areas, which house a mere 5% of the total population. This has led to a lack of data, which in turn creates unreliable results to inform conservation practices and effective species management. African Impact Foundation is working to collect data on private lands and study the area where these cats are primarily residing, to work towards evidence based conservation practices.","donated":1000.0,"years":"2019","website":"https://africanimpactfoundation.org/conservation-project-kruger/","organization":"African Impact Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/10a6bd6f31c7bb762764595a693d55a8-65173137_2331646083584624_6032313298450382848_n.jpg","youtube":"","lat":-32.2322,"lng":25.7471},{"name":"David Shepherd Wildlife Foundation","country":"United States","city":"","state":"","category":"RANGERS","description":"The David Shepherd Wildlife Foundation (DSWF) helps support rangers across Africa and Asia - from the mountains of Mongolia, to the forests of Russia and the wild plains of Africa. DSWF directly funds projects that support rangers in their daily roles, helping to ensure they get the vital field equipment and level of training they need.","donated":1000.0,"years":"2019","website":"https://davidshepherd.org/our-work/wildlife-rangers","organization":"David Shepherd Wildlife Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/8548375b2c03fb0c8915c311bee12882-23915998_10159689887310224_3542472433599797701_n.jpg","youtube":"","lat":39.7438,"lng":-97.2564},{"name":"Combatting Illegal Wildlife Trade in DRC","country":"Congo, Democratic Republic Of The","city":"","state":"","category":"LEOPARD","description":"Conserv Congo is a non-profit organization, based in the Demorcratic Republic of Congo. Their mission is to conserve congolese biodiversity, focusing on combatting the illegal trade of wildlife, fighting poaching, technical and logistical support for park rangers, youth education on conservation, reforestation of land and ecotourism.","donated":5000.0,"years":"2019","website":"https://conservcongo.wordpress.com/","organization":"Conserv Congo","photo":"https://zeemapsimages.s3.amazonaws.com/916560e8bb0de23b479addf02a1e0cfc-17972111_257237694685347_879784290988535515_o.jpg","youtube":"","lat":-3.1773,"lng":22.6201},{"name":"Wildlife Alliance","country":"Cambodia","city":"","state":"","category":"TIGER","description":"Wildlife Alliance was founded in 1995 originally as the Global Survival Network and is an international 501(c)(3) non-profit organization. Wildlife Alliance is the leader in Direct Protection of Forests and Wildlife in tropical Asia, providing on-the-ground protection to one of the last unfragmented rainforests in Southeast Asia. The Cardamom Rainforest Landscape is a critical part of the Indo-Burma Biodiversity Hotspot which supports populations of >50 IUCN Threatened species of vertebrates and serves as the region\u2019s most important watershed, climate regulator and carbon sink. The Cardamom Mountains face severe threats from wildlife poaching, illegal logging, land grabbing, and slash and burn farming. The effect is devastating on the rich local biodiversity and tropical rainforest. Wildlife Alliance supports rangers to protect this ecosystem, and strives to restore the habitat through effective park management, patrols, and enforcement of policies to protect this jewel of Southeast Asia. Wildlife Alliance manages 8 ranger stations with an average of 8,000 of patrols covering 119,552 km each year. When offenders are caught, Wildlife Alliance takes a hands-on approach by accompanying offenders to court and following up on all court cases to ensure the proper legal procedures are applied.","donated":1000.0,"years":"2019","website":"https://www.wildlifealliance.org/cardamom-protection/","organization":"Wildlife Alliance","photo":"https://zeemapsimages.s3.amazonaws.com/be3eb2fc8bf02f7ab699b4e2441166c1-WILDLIFEALLIANCE1.jpg","youtube":"","lat":9.7804,"lng":107.9293},{"name":"Wildlife Protection Solutions","country":"United States","city":"","state":"Connecticut","category":"LEOPARD","description":"Wildlife Protection Solutions is a non profit organization whose mission is to use technology, to conserve endangered species and ecosystems. The team consists of technology experts seeking to enhance conservation best practices, through the practical application of new software, hardware and field methods. WPS has established research camps in a number of international locations, including but not limited to, the US, South Africa, Zimbabwe, Madagascar, Indonesia, Vietnam and Malaysia. Species extinction is happening faster than every, and we\u2019re losing an estimated 25 species every single day. But WPS\u2019s wildlife team is taking a stand by deploying our real-time monitoring system around the world to protect against wildlife crime and poaching.","donated":1000.0,"years":"2019","website":"https://wildlifeprotectionsolutions.org/wpswatch-program/","organization":"Wildlife Protection Solutions","photo":"https://zeemapsimages.s3.amazonaws.com/75596ae6e58358ee60033b72a7ca70bb-WILDLIFEPROTECTIONSOLUTIONS1.jpg","youtube":"","lat":34.9293,"lng":-97.2577},{"name":"Paso Pacifico","country":"Nicaragua","city":"","state":"","category":"JAGUAR","description":"Paso Pacifico was founded in 2005, and is a non profit organization, whose mission is to restore and conserve the natural ecosystems of Central America\u2019s Pacific Slope. They aim to do this by collaborating with landowners, local communities and involved organizations to promote ecosystem conservation. Their reforestation projects across Nicaragua\u2019s Pacific Slope are restoring habitat for carnivorous felids such as the jaguar, ocelot, and mountain lions, as well as contributing to the conservation of the landscape. Once believed to be extinct in Nicaragua, jaguars are slowly recovering on the Pacific Slope of Central America in the Paso del Istmo Biological Corridor. Protecting jaguars is one primary goal of their program. Paso Pacifico has been using camera traps placed in strategic locations across their reserves to monitor and document the recovery of the species in Nicaragua. The Camera traps help to map critical habitat areas for jaguars and to identify the availability of prey to these large predators. The \u201ccommunity\u201d of forest wildlife can provide clues about the health of the forest.","donated":8300.0,"years":"2019","website":"https://pasopacifico.org/project/jaguars/","organization":"Paso Pacifico","photo":"https://zeemapsimages.s3.amazonaws.com/a0a4345e3f7b3bf1e3ad53c554d3a7cf-PASOPACIFICO2.jpg","youtube":"","lat":14.5291,"lng":-82.2329},{"name":"The Altai Project","country":"Russia","city":"","state":"","category":"SNOW LEOPARD","description":"The Altai Project protects natural landscapes and wildlife, and supports indigenous people and traditions, in and around Russia and the 4-nation Greater Altai region that includes Mongolia, Kazakhstan and China. As of 2014, fewer than 100 snow leopards remain in Russia, mostly in the Altai-Sayan Ecoregion. As an apex predator, this beautiful cat plays a critical role in maintaining the structure of the regions ecological community. The Altai Project have worked intensively to provide financial support, technical and scientific expertise and equipment to aid scientists from Altaisky Nature Reserve. For the last 3 years, these scientists have conducted extensive presence/absence and camera-trapping surveys to gain a more comprehensive and nuanced understanding of Snow Leopard distribution and ecology in Altai and other parts of the cats Russian habitat Range. The Altai Project have provided dozens of camera traps, developed and installed anti-poaching monitoring devices, designed date recording technology and financially supported numerous surveying and anti-poaching expeditions.","donated":8500.0,"years":"2019","website":"https://www.altaiproject.org/2014/02/snow-leopard-campaign/","organization":"The Altai Project","photo":"https://zeemapsimages.s3.amazonaws.com/bc052027a47e8e270bfc322139ee72fb-ALTAIPROJECT1.jpg","youtube":"","lat":63.1285,"lng":104.9309},{"name":"Florida Wildlife Corridor","country":"United States","city":"","state":"Florida","category":"COUGAR","description":"The Florida Wildlife Corridor, is a registered non-profit organization, championing the public and partner support needed to permanently connect, protect and restore, a statewide network of lands and waters that supports wildlife and people, including the native Florida Panther. Using a science-based approach, on-the-ground knowledge of the Corridor, and the support of thousands of followers throughout the state and nation, the Florida Wildlife Corridor now embarks on its most important journey \u2013 to accelerate the rate of conservation in Florida by 10% annually in order to protect 300,000 acres within the Corridor by the end of 2020. At present the Florida Wildlife Corridor provides habitat for 42 federally listed endangered species, 24 threatened species and 15 candidate species. At the state level, there are an additional 176 species listed as endangered, 56 as threatened and 29 as a species of special concern.","donated":9000.0,"years":"2019","website":"http://floridawildlifecorridor.org/","organization":"Florida Wildlife Corridor","photo":"https://zeemapsimages.s3.amazonaws.com/fd3b0899184a53bae2975b225027ce25-FLORIDACORRIDOR1.jpg","youtube":"","lat":39.436,"lng":-95.5574},{"name":"Protecting Margay Habitat","country":"Mexico","city":"","state":"","category":"MARGAY","description":"The Sierra Gorda Alliance was founded in 1987 and is working with local communities to protect cloud forests which have dwindled to just 2% of their original coverage. These forests house thousands of animals, among them some of Mexico's most threatened species, including the magnificent margay. They are working with local communities to protect - not plunder - these natural resources to continue to protect margay's vital habitats.","donated":7900.0,"years":"2019","website":"http://sierragorda.net/en/","organization":"Grupo Ecologico Sierra Gorda I.A.P","photo":"https://zeemapsimages.s3.amazonaws.com/ba86709414d0e63b6feb03eded6c730c-GRUPO2.png","youtube":"","lat":25.7065,"lng":-100.3988},{"name":"Kope Lion","country":"Tanzania","city":"","state":"","category":"LION","description":"Kope Lion, which is short for Korongoro People\u2019s Lion Initiative, is a non-profit, non government organization registered in the US and Tanzania. Kope Lion was founded in 2011 and focuses on human-lion coexistence in Ngorongoro Conservation Area. The organization is comprised of local experts, international scientists and local communities. The Ngorongoro landscape is unique, renowned for its spectacular natural beauty in a landscape with vast grass-plains, volcanic highlands, dense mountain forests, archaeological and cultural values, including the evolution of man and a present-day traditional pastoralist system, impressive wildlife populations, including the great migration. Perhaps the biggest symbol for this landscape is the Ngorongoro Lion. In 2011 Kope Lion established a full time, on site presence on Ngorongoro. Their work was expanding upon a long term dataset, including family histories and lion population genetics reaching back to 1962. Their aim was to move beyond ecological research and instead focus on conservation, threat reduction and incorporating the local community, the Maasai, to work with them instead of against them. Many lion hunters are now employed as Lion protectors.","donated":1000.0,"years":"2019","website":"https://kopelion.org/","organization":"Kope Lion","photo":"https://zeemapsimages.s3.amazonaws.com/75d2edf2a5fe9fb8ba3ccca116e3c751-KOPELION2.jpg","youtube":"","lat":-5.8603,"lng":32.0827},{"name":"Singita Grumati Fund","country":"Tanzania","city":"","state":"","category":"LEOPARD","description":"The Grumeti Fund is a non-profit organization carrying out wildlife conservation and community development work in the western corridor of the Serengeti ecosystem in Tanzania. The Grumeti concessions are bountiful lands, rich in flora and fauna, considered by many as an international treasure. For years uncontrolled hunting and rampant poaching had decimated local wildlife populations within the western corridor, which in turn plunged surrounding communities into poverty. But thankfully in 2002, the Grumeti Fund was established in an attempt to rehabilitate and restore the Grumeti concessions. The Grumeti fund employs 165 dedicated staff to protect, manage and monitor Grumeti\u2019s concessions and wildlife. Thanks to their passion and commitment, the near-barren plains of ten years ago are once again teeming with life.","donated":1000.0,"years":"2019","website":"https://www.grumetifund.org/our-work/anti-poaching-and-law-enforcement/","organization":"Singita Grumati Fund","photo":"https://zeemapsimages.s3.amazonaws.com/232a5cdfd60b46aeef516979563abcab-SINGITAGRUMETI2.jpg","youtube":"","lat":-6.8301,"lng":35.1068},{"name":"Snares to Wares","country":"Uganda","city":"","state":"","category":"LION","description":"Snares to Wares is a 501(c)(3) community-based conservation initiative within Michigan State University, dedicated to improving human livelihood and protecting wildlife in and around the village of Pakwach, Uganda. The initiative simultaneously transforms human lives and addresses the problem of wildlife poaching by empowering local artisans to repurpose wire snares into sculptures of the wildlife that would otherwise fall victim to snaring, such as elephants and Lions.","donated":1000.0,"years":"2020","website":"https://snarestowares.org/","organization":"Snares to Wares/ MSU","photo":"https://zeemapsimages.s3.amazonaws.com/21e6aa79002cbaae061a7d538e2670eb-ScreenShot2020-06-09at3.00.39PM.png","youtube":"","lat":3.4314,"lng":33.8412},{"name":"Urban Fishing Cat Project","country":"Sri Lanka","city":"Colombo","state":"Western Province","category":"FISHING CAT","description":"The Urban Fishing Cat project works on the conservation of Fishing Cats in the urban wetland habitats of Columbo, Sri Lanka, through awareness, education and research. From the beginning the Urban Fishing Cat project has worked closely with the Department of Wildlife Conservation and the Sri Lanka Land Reclamation and Development Corporation. By sharing the information gathered with relevant government stakeholders, the Fishing Cat became a flagship species for Wetland Conservation in Colombo.","donated":9550.0,"years":"2020, 2022","website":"https://fishingcats.lk/","organization":"Urban Fishing Cat Project","photo":"https://zeemapsimages.s3.amazonaws.com/c1358408e3cd73fd25a2b496b4701c57-13227277_1083697891676851_8128138500930930632_o.jpg","youtube":"","lat":5.0054,"lng":80.5241},{"name":"Jomolhari Snow Leopard Conservation Program","country":"Bhutan","city":"","state":"","category":"SNOW LEOPARD","description":"The Jomolhari Snow Leopard Conservation project is an integrated approach to conserve an important snow leopard region and bring benefits from conservation to local communities. Their aim is to encourage resident communities to actively participate in snow leopard conservation, which in turn can only succeed with their support.","donated":1000.0,"years":"2020","website":"https://bhutanfound.org/projects/snow-leopard-conservation-program/","organization":"Bhutan Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/58c6a3cd430d46d05259ef8482835f35-ScreenShot2020-06-09at3.11.53PM.png","youtube":"","lat":25.8767,"lng":88.8142},{"name":"Sumatram Tigers in Kerinci Seblat National Park","country":"Indonesia","city":"Padang","state":"West Sumatra","category":"TIGER","description":"Since 2000, Fauna & FIora International has been working in Kerinci Seblat National Park, with the park authorities and local communities to strengthen tiger protection through forest patrols, undercover investigations and law enforcement operations to combat illegal trafficking of tigers and tiger parts. Kerinci Seblat National Park is the second largest national park in Southeast Asia, is recognized as a UNESCO World Heritage site for its rich biodiversity and is a global priority for the long-term survival of wild tigers.","donated":1000.0,"years":"2020","website":"https://www.fauna-flora.org/projects/conserving-sumatran-tigers-kerinci-seblat-national-park","organization":"Fauna & Flora International","photo":"https://zeemapsimages.s3.amazonaws.com/d615c066eae3515a8df986b8eb7f9270-ScreenShot2020-06-09at3.15.09PM.png","youtube":"","lat":-2.1088,"lng":114.045},{"name":"Marbled Cat Conservation","country":"Bhutan","city":"","state":"Bumthang","category":"MARBLED CATS","description":"This project is to conduct camera trapping in the Bumthang territorial forest division, in order to asses distribution and threats to Marbled Cats and other small wild cats, in Bhutan. The data gained would support conservation plans for the cats and also conservation education activities. The funding is to purchase and deploy the camera traps.","donated":7536.0,"years":"2020","website":"","organization":"Ugyen Wangchuck Institute for Conservation & Environmental Research","photo":"https://zeemapsimages.s3.amazonaws.com/4548832eeda87a5915b04bee5556b229-1011966_432000006921037_544073962_n.jpg","youtube":"","lat":25.0832,"lng":92.4527},{"name":"Cambodia Fishing Cat Project","country":"Cambodia","city":"","state":"","category":"FISHING CAT","description":"The Cambodian Fishing Cat Project formed in 2016, following the first photo of a Fishing Cat in Cambodia for over a decade. They are working to estimate population abundance and status of the Fishing Cats in Cambodia, in particular in Paem Krasop Wildlife Sanctuary, in addition to assessing threats, raising awareness and working with relevant stakeholders to develop conservation measures to protect this newly found population.","donated":11000.0,"years":"2020","website":"http://www.fishingcatcambodia.org/","organization":"Cambodia Fishing Cat Project","photo":"https://zeemapsimages.s3.amazonaws.com/c89bd534a3031933465cfda1f1f5cb96-20245530_330165300760860_3642947162779625190_n.png","youtube":"","lat":10.7518,"lng":102.3816},{"name":"Cattle Shed Initiative","country":"India","city":"Satna","state":"Madhya Pradesh","category":"TIGER","description":"Corbett Foundations Cattle Shed fencing initiative is in place to try and reduce tiger habitat loss and degradation, as well as human-wildlife conflict. There are a large number of villages located in and around tiger habitats, and local people are depending on the forest for grazing of livestock, wood for fuel, wood for cattle fencing and farming. This initiative aims to reduce the dependency of local people on forest resources by providing alternative materials for cattle housing.","donated":10000.0,"years":"2020","website":"http://www.corbettfoundation.org/","organization":"Corbett Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/484b000a97580a4fd1de9bfcd321bc4a-84841373_10156514631796906_2925747944126676992_n.jpg","youtube":"","lat":18.1671,"lng":78.2442},{"name":"Oncilla Conservation & Research","country":"Costa Rica","city":"","state":"","category":"ONCILLA","description":"The Costa Rica Wildlife Foundation is a Non-Government Organization working on research, communication, education and action taking, in an effort to improve coexistence between humans and wildlife. The Oncilla project aims to establish itself as a long-term small cat conservation project in Costa Rica using the Oncilla as a flagship species.","donated":1000.0,"years":"2020","website":"http://costaricawildlife.org/","organization":"Costa Rica Wildlife Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/b558159e2f5118ec4984734f515009f9-116264645_2358209697806021_2695087028444951688_o.jpg","youtube":"","lat":8.7108,"lng":-83.4992},{"name":"Wildlife Poisoning Prevention & Conflict Resolution","country":"South Africa","city":"","state":"","category":"LION","description":"Wildlife Poisoning Prevention & Conflict Resolution is a Non-Profit organization that originated from a need to address the history of human-animal conflict, in particular the use of poisons for poaching and retaliatory killings. The organization works in Southern and East Africa, including Zimbabwe, South Africa, Zambia, Mozambique, Namibia, Kenya and Botswana.","donated":6000.0,"years":"2020, 2023","website":"https://wildlifepoisoningprevention.co.za/","organization":"Wildlife Poisoning Prevention & Conflict Resolution","photo":"https://zeemapsimages.s3.amazonaws.com/ffb15ddf668ffb3341724b0f36b93ac5-logo.png","youtube":"","lat":-32.9072,"lng":20.0721},{"name":"Canine Law Enforcement & Anti-Poaching Program","country":"Tanzania","city":"","state":"","category":"LION","description":"The Serengeti Plain is home to more than 3 million animals, including elephants, rhinos and a host of animals that are vulnerable to poacher\u2019s snares, including lion, leopard, buffalo, hyena, zebra, wildebeest, and giraffe. Every year 200,000 animals are poached in the Serengeti. In partnership with the Singita Grumeti Fund (SGF), WD4C has created a canine law enforcement unit in the western portion of the Serengeti ecosystem. The canine unit will complement SGF\u2019s existing scout patrol camps and twenty-four hour observation posts by searching for contraband and tracking poachers.","donated":1000.0,"years":"2020","website":"https://wd4c.org/our-work-law-enforcement/tanzania-anti-poaching-program","organization":"Working Dogs for Conservation","photo":"https://zeemapsimages.s3.amazonaws.com/8cf9b449b9ffbb2eebf6c7262c6f39ac-116559140_3121551964601757_8728566007708509793_o.jpg","youtube":"","lat":-8.2398,"lng":32.8574},{"name":"Human-Tiger Conflict Interim Relief Scheme","country":"India","city":"Mandla","state":"Madhya Pradesh","category":"TIGER","description":"The Corbett Foundation have headed an initiative providing compensation to local people who have livestock losses, due to predation by tigers and leopards, in Corbett Tiger Reserve. The program began in 1997 and aims to prevent retaliatory killings of the cats and reducing human-wildlife conflict. Corbett responds to livestock losses within 48 hours to provide compensation following a kill.","donated":17000.0,"years":"2020","website":"","organization":"The Corbett Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/2a8a4ddb50120c9f1e6cb323fb2c60ba-117908024_10157039193046906_7952324046348896339_n.jpg","youtube":"","lat":19.984,"lng":81.6733},{"name":"Eastern Ghats Wildlife Society","country":"India","city":"YSR District","state":"Andhra Pradesh","category":"FISHING CAT","description":"The Eastern Ghats Wildlife Society is a non-profit conservation organization, aiming to protect lesser-known and neglected wildlife species, in the Eastern Ghats region of South India. EGWS is developing a comprehensive understanding of the biogeographical distribution of Fishing Cats, and the implications of various human-induced activities on their survival. Similar to their work with the Fishing Cat, EGWS is undertaking a project focusing on the Rusty Spotted Cat, aiming to understand the distribution of the cats and assessing various sources of threat in their proposed project site.","donated":1000.0,"years":"2020","website":"http://www.eghats.org/","organization":"Eastern Ghats Wildlife Society","photo":"https://zeemapsimages.s3.amazonaws.com/b4ddeae66fb5e16c257cdbf36c822ef4-14100389_876954652411091_3225318705745185085_n.jpg","youtube":"","lat":22.8593,"lng":79.3736},{"name":"Animal Circus Campaign","country":"China","city":"","state":"","category":"TIGER","description":"The circus industry in China continues to cause immense suffering for many thousands of tigers, lions, bears, macaques and other wild animals. The Small Chinese NGO Freedom for Animal Actors (FAA) has been working since 2015 to expose this practice via a nationwide campaign, raising awareness of this immense cruelty and directly opposing the activities of the circus operators.","donated":8400.0,"years":"2020","website":"","organization":"Freedom for the Animal Actors","photo":"https://zeemapsimages.s3.amazonaws.com/e828dd5615782bc39260c8d490137489-Asian-Circus-Tiger-Lion-Abuse-1.png","youtube":"","lat":38.6421,"lng":106.5158},{"name":"Pallas Cat Conservation in Eastern Steppe","country":"Mongolia","city":"","state":"","category":"PALLAS CAT","description":"Steppe Wildlife Conservation & Research is a Non-Government Organization, established in 2018, dedicated to the conservation of local wildlife, especially Pallas's Cats in Eastern Mongolia. Their focus is on building local awareness and knowledge through community based tourism, education and research. Big Cat Rescue has donated to their tourism project and to building dens so that mother cats can disperse safely after their kittens are grown.","donated":19400.0,"years":"2020-2023","website":"https://www.steppewildlife.org/","organization":"Steppe Wildlife Conservation & Research","photo":"https://zeemapsimages.s3.amazonaws.com/1d91eda5f243120a291d5758e54483bd-0.jpg","youtube":"","lat":44.6347,"lng":105.6653},{"name":"Combatting Wild Animal Trafficking in Brazil","country":"Brazil","city":"","state":"","category":"OCELOT","description":"National Network to Combat Trafficking in Wild Animals (RENCTAS) is a non-governmental, non-profit organization founded in 1999, that fights for the conservation of biodiversity, and since then has won international awards and acclaim for its innovative approach to tracking and combating the global illegal wildlife trade. The group\u2019s pioneering strategy is to use social media to track the sale and movement of animals out of Brazil, and turn over the data to law enforcement.","donated":1000.0,"years":"2020","website":"https://www.renctas.org.br/","organization":"National Network to Combat Trafficking in Wild Animals (RENCTAS)","photo":"https://zeemapsimages.s3.amazonaws.com/4d4c1bb315d89f2fa0e115a7f61f0d41-14355111_1240219749376170_7230595715863433323_n.jpg","youtube":"","lat":-16.611,"lng":-50.5599},{"name":"Peruvian Desert Cat Project","country":"Peru","city":"","state":"","category":"PAMPAS CAT","description":"The Peruvian desert cat initiative aims to study, protect and raise awareness about the importance of the desert cat in the Sechura desert and in the dry forest of northern Peru.","donated":18000.0,"years":"2019, 2020","website":"","organization":"Peruvian Desert Cat Project","photo":"https://zeemapsimages.s3.amazonaws.com/5423d54dbe258a2490c31d0a493f15ce-134150599_2474381339536729_1277678511119269406_n.jpg","youtube":"","lat":-7.3129,"lng":-72.1767},{"name":"The Fishing Cat Project","country":"India","city":"Chilika","state":"Odisha","category":"FISHING CAT","description":"Chilika is Asia's largest brackishwater lagoon, India's first Ramsar site, and, a stronghold of the Fishing Cat. The Fishing Cat project has been working in this landscape since 2017 to involve multiple stakeholders including relevant government agencies and resident communities, especially fishermen in Fishing Cat conservation. In 2021The Fishing Cat project started the first population study of fishing cats, outside protected areas, in a human dominated landscape. Their work led to the fishing cat being declared the official ambassador animal of Chilika, increasing interest in their protection and awareness for the species.","donated":7500.0,"years":"2021","website":"https://fishingcat.org/the-fishing-cat-project/","organization":"The Fishing Cat Project","photo":"https://zeemapsimages.s3.amazonaws.com/ffdffbc7b12cff21d1d8aa46d99a508a-27355962_1584610231586121_584327973516550947_o.jpg","youtube":"","lat":23.2474,"lng":81.5682},{"name":"Geoffrey Cat Working Group","country":"Paraguay","city":"","state":"","category":"GEOFFREY CAT","description":"Activities include spay/neuter/vaccination of domestic dogs and cats, auto refillable drinkers and rain capture systems, predator proof chicken coops Funds will support conservation projects across several South American countries, such as Argentina, Bolivia, Uruguay, and Chile. These projects focus on mitigating threats to small wild felids through targeted actions such as vaccination and sterilization campaigns for domestic dogs and cats, installation of road signs to alert drivers and reduce wildlife-vehicle collisions, support for wildlife rescue and rehabilitation centers, engagement with rural communities, in situ monitoring of wild cat populations, and reinforcement of poultry enclosures to prevent conflicts with wild felids. Combination of (1) providing materials to build predator proof chicken coops to eliminate human/cat conflict, (2) vaccinating and spay/neuter of free roaming domestic feral and owned dogs to reduce the spread of carnivore distemper virus to wild cats, and (3) educating local residents to foster positive attitudes toward the cats and support for their conservation. The Geoffroy\u2019s Cat Working Group (GCWG) aims to mitigate its conserve the Geoffroy\u2019s cat (Leopardus geoffroyi) across its entire distribution range in South America. BCR provided Funding to help with the creation of the Geoffrey Cat Working Group. The Funds will be split between a network of researchers and conservations, working to protect and mitigate threats to Geoffrey Cats throughout their distribution range. Individuals will work with each other from different regions to share tips, techniques and finding on the species, to help build an overall idea of the species status and needs. Since Dec 2020 there are 30 members across 6 countries.","donated":143600.0,"years":"2021, 2024, 2025, 2026","website":"","organization":"Geoffrey Cat Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/592411de889197f6ed6310c4d32e4451-Unknown.png","youtube":"","lat":-20.9387,"lng":-56.7141},{"name":"Big Cats in Karen State","country":"Burma","city":"","state":"","category":"TIGER","description":"The Karen Wildlife Conservation Initiative is a collaboration of international and local partners to preserve Burma\u2019s last Eden, Karen State. Geographically, Karen State sits within a major international wildlife trade hub. The extraction, trade and consumption of wildlife for the expanding black markets in East Asia presents the most immediate and extreme threat to wildlife species in this area. To mitigate this immediate and substantial threat, KWCI in partnership with the Karen Forestry Department trained and deployed the first Wildlife Protection Units (WPU) in 2012, teams of highly skilled Rangers patrolling the forest in priority protected areas.","donated":1000.0,"years":"2021","website":"http://www.kwci.org/","organization":"Karen Wildlife Conservation Initiative","photo":"https://zeemapsimages.s3.amazonaws.com/20c8857baff1ec1f14c7d876f678d94a-91543019_2817146958354213_958807129064472576_n.jpg","youtube":"","lat":18.9904,"lng":93.3733},{"name":"Wild Cat Threat Reduction","country":"Sri Lanka","city":"","state":"","category":"LEOPARD","description":"The Wildlife and Nature Protection Society (WNPS) was established over 100 years ago and is the third oldest non-governmental organization of its kind in the world, and first in Sri Lanka. Sri Lanka is among the world's 34 biodiversity hotspots and is home to 4 distinct species of wild cats; the fishing cat, Jungle Cat, Rusty-Spotted Cat and the larger more recognized Leopard. In 2018 WNPS started an initiative to focus more on conserving these Wild Cats.","donated":1000.0,"years":"2021","website":"https://www.wnpssl.org","organization":"Wildlife and Nature Protection Society (WNPS)","photo":"https://zeemapsimages.s3.amazonaws.com/15a235a06e9c679afb27a744acd16ca1-81065830_2644257875655700_1491980808662024192_n.png","youtube":"","lat":9.1829,"lng":80.2463},{"name":"Predator Protection","country":"Kenya","city":"","state":"Makueni County","category":"LION","description":"Maasai Wilderness Conservation Trust (MWCT) was established in 2000 by the Maasai of Kuku Group Ranch as a grassroots conservation trust. The trust focuses on the Maasai landscape and the communities of Kenya\u2019s Chyulu Hills, which are set within the Amboseli-Tsavo region of southern Kenya. The trust operates as a non-profit entity and aims to conserve the wildlife and cultural heritage of the region by focusing on initiatives that create sustainable economic benefits for the Maasai community. MWCT realizes living in harmony with wildlife (i.e. lions, leopards, hyenas etc.) can be very challenging as livestock owners experience considerable financial losses as a result of livestock depredation by these predators. So in acknowledgement MWCT started the Wildlife Pays compensation program for predator protection in 2007 to alleviate the burden of living with wildlife for the local Maasai community in agreement to not kill but protect all wildlife on Kuku Group Ranch.","donated":1000.0,"years":"2021","website":"http://maasaiwilderness.org","organization":"Maasai Wilderness Conservation Trust","photo":"https://zeemapsimages.s3.amazonaws.com/37210ebdcb7f2613b6b8a1bc9b7eb057-MWCT-Transparent.png","youtube":"","lat":0.932,"lng":38.3269},{"name":"Wild Cats and Camera Traps","country":"Malaysia","city":"","state":"","category":"SMALL CATS","description":"The Borneo Wild Cat Initiative was started in 2008, focusing on key questions about wild cat density and abundance in an under-studied habitat, while investigating and mitigating threats facing them. The Bornean tropical forest contains a guild of five felid species: Sunda clouded leopard, bay cat, marbled cat, flat-headed cat and leopard cat . The Borneo Wild Cats Initiative is the first long-term, intensive camera-trapping study of clouded leopards and other felids in Indonesian peat-swamp forest aiming to increase knowledge on ecology, behaviour and conservation status.","donated":1000.0,"years":"2021","website":"https://www.borneonaturefoundation.org/project/wild-cats/","organization":"Borneo Nature Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/7186916762056669aeba3f954d0db209-55786343_2546737385401319_6015283542668345344_n.jpg","youtube":"","lat":6.379,"lng":103.3125},{"name":"Rapid Rescue Team","country":"Cambodia","city":"","state":"","category":"CLOUDED LEOPARD","description":"Southeast Asia is at the epicenter of the global extinction crisis. Wildlife Alliance delivers a unique and successful model of hands-on direct protection to 1.3 million hectares of the Cardamom Mountains rainforest, one of the last unfragmented rainforests in Southeast Asia.The illegal wildlife trade is one of the biggest threats to wildlife globally. Estimated to be worth more than US $20 billion annually, this trade has escalated from a conservation issue to a worldwide criminal enterprise that is devastating wildlife populations. Cambodia is a source, transit country, and destination for many of the world\u2019s most trafficked and valuable species. In 2001 Wildlife Alliance partnered with the cambodian government to implement a complete approach to combating the illegal wildlife trade through their award-winning wildlife police unit \u2013 the Wildlife Rapid Rescue Team. The team investigates trade networks, apprehends wildlife traffickers, and rescues and releases animals that have fallen victim to the trade. By combining governmental authority with Wildlife Alliance oversight the team represents a unique model for tackling the illegal wildlife trade in Asia and is the only law enforcement unit in the region to be specifically dedicated to cracking down full-time on wildlife trafficking.","donated":1000.0,"years":"2021","website":"https://www.wildlifealliance.org/wildlife-police/","organization":"Wildlife Alliance","photo":"https://zeemapsimages.s3.amazonaws.com/c20050acbbdf810477b03239fb1931ac-ScreenShot2021-07-21at3.40.49PM.png","youtube":"","lat":10.809,"lng":103.7183},{"name":"Project Wildcat","country":"Mexico","city":"","state":"","category":"JAGUAR","description":"Primero Conservation is an established 501(c)(3) nonprofit that works with ranches, landowners, and other organizations in Arizona, New Mexico, and Sonora to improve wildlife habitat and provide alternative solutions to wildlife conservation and natural resource management. In 2015 they initiated Project WILDCAT focusing on protecting and increasing threat mitigation for native wildcats, including Jaguars, Cougars and Ocelots. Jaguars are perhaps the most powerful cultural icon for wildlife and wildlands in Latin America. They are also an umbrella species in that the maintenance of jaguar populations requires the conservation of large areas of habitat, which protect an immense diversity of other species. Jaguars face severe problems, primarily related to direct illegal killing throughout its range and habitat loss and fragmentation.","donated":1000.0,"years":"2021","website":"https://www.primeroconservation.org/","organization":"Primero Conservation","photo":"https://zeemapsimages.s3.amazonaws.com/f1b971f9a0345db6d849e4ce1eb3d6f9-unnamed.png","youtube":"","lat":20.8767,"lng":-100.0568},{"name":"Ocelot Working Group","country":"Mexico","city":"Zacapalco","state":"Morelos","category":"OCELOT","description":"To fund multiple WG projects including spay/neuter/vaccination of domestic dogs and cats, auto refillable drinkers and rain capture systems, predator proof chicken coops, night houses for guard dogs to prevent predation by jaguars, materials for outreach materials and murals, and administrative costs of transition of the nonprofit management. The Ocelot Working Group started their work in 2020, to better understand the threats to small cats in the study area of Morelos. Morelos has registered all 4 of the small cat species that reside in Mexico, but this is one of the first conservation projects to be initiated for their benefit. The team started educational campaigns through local newspapers & social media, provided community workshops to local people and their children and outreach programs about the small cats that live in Morelos, to increase awareness and local support. In addition one of their main focuses is to mitigate the presence of feral/community dogs, who share habitats with the small wild cats and have been detected at 100% of study sites, through camera traps. These dogs can carry diseases such as distemper, that if contracted by the cats can be fatal, so the team is working to vaccinate at least 75% of the population annually and sterilize to reduce breeding. The services are offered to local pets at no cost to encourage participation. Part of their team is made up of local students who receive training and on the ground training to become future conservationists.","donated":163731.0,"years":"2021, 2024, 2025, 2026","website":"","organization":"Ocelot Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/9fdd61e1f7e012d21adc4d2fbf8612cf-MariamWeston.jpg","youtube":"K6ZyzboLoUU","lat":23.47,"lng":-104.2431},{"name":"African Golden Cat Threat Mitigation","country":"South Sudan","city":"","state":"","category":"AFRICAN GOLDEN CAT","description":"The AGCCA & WG, run by Badru Mugerwa, aims to reduce human-related deaths of African golden cats, specifically due to snare poaching. The root cause of poaching is poverty, lack of employment and lack of income for local communities. In an effort to mitigate snares and poaching, AGCCA & WG focuses on improving socio-economic status of local people by providing alternative sources of income and meat through livestock farming. AGCCA & WG provide a mature reproductive animal, that is the \u201cseed\u201d animal, along with necessary training, to a local family, which pledges to stop poaching. When that animal has offspring, at least one female offspring is given to the nearest household (regardless if it partakes in poaching or not) in exchange for voluntary community policing against poaching and other threats to AGC (and wildlife in general). That way, the benefits gradually cascade across the community. By winning over and supporting locals, AGCCA & WG is able to raise awareness of the small cat species, instill interest in its protection and create long term conservation strategies. 2021 $5k 2026 $15k: To reduce poaching threats to the African Golden Cat by fostering \"local community livelihood improvement\" that provide alternative income and food sources along with community education to eliminate the need for poaching for income or food. Activities include operating pig, rabbit, goat, and sheep \"seed banks\" that reproduce to generate income and food, providing free oral care, mobilizing community residents into surveillance groups and snare removal teams to reduce poaching, providing loans through Savings and Credit Cooperatives, delivering educational programs to schools, and establishing tree nurseries to provide alternative sources of fuel.","donated":30000.0,"years":"2021, 2026","website":"https://www.savingafricangoldencat.com/","organization":"African Golden Cat Conservation Alliance and Working group","photo":"https://zeemapsimages.s3.amazonaws.com/993eff006f05bd4187a3048b5f1cc617-unnamed.jpg","youtube":"q0Is2hDcAaE","lat":6.5315,"lng":33.9356},{"name":"Pampas Cat Working Group","country":"Bolivia","city":"","state":"","category":"PAMPAS CAT","description":"The Pampas Cat Working Group (PCWG) is a network of conservationists and researchers that study and protect the pampas cat across its distribution in South America. Their main goal is to implement threat mitigation activities that will ensure the survival of this small wild cat in the current biodiversity crisis. The Pampas Cat at present has a conservation status listed on the IUCN red list as near threatened in some of its habitat, but in Argentina, Bolivia, Brazil and Ecuador it is Vulnerable. The PCWG is working to increase awareness of the species, its needs and increase involvement from local communities. They are implementing direct on the ground conservation efforts such as road signs to reduce roadkills, building artificial water holes so in the dry season the pampas cats have somewhere to get this important resource, and developing sterilization and vaccination campaigns on domestic and feral dogs. Trail cameras are being used for research and threat mitigation. Rural communities in forested regions of Latin America frequently experience conflict with small wild cats such as tiger cats (Leopardus tigrinus pardinoides), ocelots (Leopardus pardalis),jaguarundi (Herpailurus yagouaroundi), and margay (Leopardus wiedii), particularly when these carnivores prey on backyard poultry. These incidents often trigger retaliatory killings that threaten vulnerable cat populations. In response, the Pampas Cat Working Group (PCWG), a regional conservation network, has co-developed a low-cost, community-led solution: constructing predator-proof chicken coops, providing captive-raised poultry, and offering training in poultry care. This initiative not only protects poultry (a key livelihood resource) but also fosters coexistence and appreciation of wild species. In addition, our strategy has proven successful in several communities across Peru, Ecuador, and Brazil. Once poultry losses are eliminated, people tend to become more tolerant\u2014and even protective\u2014of small wild cats. Moreover, communities often benefit from a surplus of eggs, which can be sold to neighbors and nearby towns, generating extra income. In partnership with Alexander Medina, a community leader in Pachijal, Ecuador, we aim to implement this strategy within his and neighboring communities, Guayabillas, Santa Rosa, and Mashpi. All sites are located within a Conservation Imperatives site in the highly biodiverse and endangered Tropical Andean foothills where cloud forests and Choc\u00f3 lowland rainforest converge. By eliminating poultry losses, we anticipate a major reduction in retaliatory killings, the empowerment of local households, and an expansion of community-led conservation across the region.","donated":110117.0,"years":"2021, 2022, 2023, 2024, 2025, 2026","website":"","organization":"Pampas Cat Working Group","photo":"https://zeemapsimages.s3.amazonaws.com/bf757415c9c7db9f637fd2ae0783c26b-WhatsAppImage2024-03-24at12.40.48.jpeg","youtube":"3MropftFbvA","lat":-18.1763,"lng":-65.6261},{"name":"Carnivore Protection & Restoration","country":"United States","city":"","state":"Colorado","category":"COUGAR","description":"Established in 1989, WildEarth Guardians is a non-profit 501c3 organization that protects and restores wildlife and wild places in the United States, while working towards coexistence between humans and wildlife. Their wildlife program uses legal means to obtain formal listing under the Endangered Species Act for species nearing extinction, seeks to protect native carnivores like mountain lions, Canada lynx and bobcats, and restore native carnivores to their natural habitat. They also work to decrease direct threats to wildlife including trapping, poisoning and snaring. Canada lynx were federally protected as a \u201cthreatened\u201d species in 14 states in 2000. New Mexico was originally not included on the list, but as a result of efforts by Guardians and partners, lynx are now protected wherever they are found. Conservation of Mountain Lions has also long been a priority for WildEarth Guardians, with their focus on eliminating or greatly reducing hunting quotas set by state wildlife agencies and the game commissions that oversee them, they also included new policies to educate hunters about the need to protect lactating females to ensure young kittens aren\u2019t abandoned.","donated":1000.0,"years":"2021","website":"https://wildearthguardians.org/","organization":"WildEarth Guardians","photo":"https://zeemapsimages.s3.amazonaws.com/9e3a6761d36cdb8620739ef9a0ffe9e7-272903234_5264249046921414_5839668712523746157_n.jpg","youtube":"","lat":35.7408,"lng":-94.9608},{"name":"Centennial Carnivore Connection Project","country":"United States","city":"Centennial","state":"Colorado","category":"COUGAR","description":"Working Dogs for Conservation is the world\u2019s leading conservation detection dog organization. They are pioneers in using dogs\u2019 extraordinary sense of smell to further conservation and aid in the fight against wildlife trafficking. Conservation detection dogs can be up to 40 times more efficient than human searchers at developing population and habitat data: they can cover large areas and rough terrain, detect cryptic species and scents hidden in deep vegetation, and do it with virtually limitless eagerness and energy. Human searches are often biased toward adult and territorial animals, but dogs find scats from all individuals, including juveniles and subordinates, giving better data and more accurate population and distribution estimates. Working Dogs for Conservation trained dogs to locate the scats of grizzly bear, black bear, mountain lion, and wolf in the Centennial Mountain Range to non-invasively collect data. The data is used to determine habitat selection and movement patterns of the species to better understand and manage conservation plans.","donated":1000.0,"years":"2021","website":"https://wd4c.org","organization":"Working Dogs for Conservation","photo":"https://zeemapsimages.s3.amazonaws.com/43c214f3f78b4c50dfc4ff447d549608-wd4c_10177_website_assets66.jpg","youtube":"","lat":36.8983,"lng":-96.0261},{"name":"Big Cat Hunting/Poaching Mitigation","country":"Kenya","city":"","state":"Samburu County","category":"LION","description":"Milgis Trust is a nonprofit organization founded in 2004 with the aims of protecting wildlife, habitat and local people in a very remote part of Northern Kenya. Matthews Range, Ndoto Mountains and Karisia Hills, spreading out towards Oldonyo Mara, Mount Nyiru and Mount Kulal; the trust covers approximately 8,000 sq kms and supports a diverse range of flora and fauna and the pastoral livelihoods of several different nomadic tribes including the Samburu, Turkana and Rendille. The Milgis ecosystem is host to an extraordinary variety of wildlife because of the variation of unique habitats from the desert sands to the mountains and thick rainforests. This promotes incredible diversity and is why the Milgis has such a wide array of species, some being endemic to the area. Amongst this wildlife is wild cats including Lions, Leopards, Cheetah and Caracal. Poaching, hunting and land degradation are all immediate threats to the Milgis ecosystem and the trust is working to combat them. By employing responsible people to be scouts and wildlife rangers, from within local communities, they become responsible for making sure wildlife and the environment are kept intact and not irresponsibly abused. They are responsible for Anti-poaching initiatives, Animal rescues, mitigating human-animal conflict and acting as a liaison between the Milgis Trust and their communities. In turn the healthy ecosystem is to the benefit of all that depend upon it. A large part of the trust's conservation strategy is the implementation of projects which help the communities with some of their challenges. They have managed to get people to understand that by caring for the environment, ecotourism will increase in the area creating income for the people as well as allowing the Milgis to implement the health, education, veterinary aid for livestock and water projects.","donated":2000.0,"years":"2022, 2023","website":"https://www.milgistrust.com/","organization":"Milgis Trust","photo":"https://zeemapsimages.s3.amazonaws.com/763c331c45f875bab2ad6a9b1f6c256c-Lions-Masai-Mara-Jim-Sanderson.jpg","youtube":"","lat":-1.3305,"lng":37.3739},{"name":"Black Mambas Anti-Poaching Team","country":"South Africa","city":"","state":"","category":"LION","description":"The Black Mambas Anti-Poaching Unit was founded in 2013 by Transfrontier Africa NPC and is an all-female unit of 36 individuals, who work to guard South Africa's Wildlife. Early detection and rapid response is all that stands between poachers and wildlife including Lions, Elephants and Rhino. The Black Mambas are the first line of defense providing boots on the ground and are responsible for the early detection of poaching insurgents through monitoring and surveillance during their daily patrols. The Black Mambas remove snares and traps set by the poachers and since inception, have identified and destroyed dozens of poacher camps and bushmeat kitchens. The lion is the latest species swept up in the illegal wildlife trade for the Asian 'medicinal' market. As wild tiger populations dwindle, poachers are turning to lions to feed the insatiable appetite for \u2018potions\u2019 made from cat bones and sold as Chinese \u201cremedies\u201d. Lion bones are virtually indistinguishable from tiger bones, and bones from wild lions are considered more efficacious than those bred in captivity.","donated":1000.0,"years":"2022","website":"https://www.blackmambas.org/black-mambas.html","organization":"","photo":"https://zeemapsimages.s3.amazonaws.com/dbb79119dccd5de36489ab4b51bcaf61-245039363_1882232221976515_8157827140822717801_n.jpg","youtube":"","lat":-31.8389,"lng":22.4213},{"name":"Embaka Saving the African Golden Cat","country":"Uganda","city":"","state":"","category":"AFRICAN GOLDEN CAT","description":"Embaka is a registered non-profit Community Based Conservation Organization, located in Uganda that is working on threat reduction and conservation of the elusive African Golden Cat. They are a part of the newly created African golden cat Conservation Alliance and Working Group (AGCCA & WG), whose communal goal is to expand and oversee the conservation of the African golden cat across the entire species range. The African Golden Cat is Africa's least known wild cat and listed as vulnerable on the IUCN red list. 2024 Project has three element: (1) Reduce the threat to the African golden cat in Budong Forest Reserve by supporting livestock seed as alternatives to bushmeat and as a way to improve household incomes. (2) support village saving banks which provide soft loans to households to reduce poverty. (3) Monitor the impact of these livelihood-improving activities on discouraging poaching by conducting focus group discussions and interviews and creating conservation awareness in the villages during the discussions. 2022 Embaka is currently working on a Smile for Conservation initiative where they provide local communities with health and financial aid in return for anti-poaching cooperation and involvement. This initiative is focused towards communities who live around Bwindi Impenetrable National Park, a known residence of the African Golden Cat. The initiative aims to have a poachers to protectors effect by providing local communities with the use of mobile dental clinics, the first of its kind in the region, to provide free oral health check-ups, pain relieving procedures and oral health education. The households to benefit are selected at random via public and fully transparent lotteries from all households and are required to 1) have taken the pledge to support anti-poaching efforts either by committing to stop poaching and/or volunteer in the anti-poaching community policing groups and 2) are living not further than 1 km from the Bwindi boundary. The outcome of this activity will be improved health and wellbeing for all age classes, women and men, and increased awareness about the importance of African golden cats. The pamphlets announcing the dental clinics will have the Embaka (African golden cat) logo and the service will be clearly tied to conservation and offered as a benefit/incentive to households that have pledged to voluntarily combat poaching within the community.","donated":10000.0,"years":"2022, 2024","website":"https://www.savingafricangoldencat.com","organization":"Embaka","photo":"https://zeemapsimages.s3.amazonaws.com/4ab1e8b8345a75a40602f1b097c8e200-AfricangoldencatPhilippe-Jim-Sanderson.jpg","youtube":"","lat":1.817,"lng":34.8861},{"name":"Human - Cougar Conflict Mitigation","country":"United States","city":"San Francisco","state":"California","category":"COUGAR","description":"Across much of California, pumas (Puma concolor) are the last remaining large carnivore and have important ecological roles as keystone predators that regulate mesocarnivores, such as bobcats (Lynx rufus). Pumas are a specially protected mammal in California but throughout their range, habitat fragmentation and human activity have contributed to population declines, and human encroachment in and around wildlife habitat continues to intensify. Felidae Conservation Fund is working to collect data, non-invasively through camera trapping and scat collection, to monitor wildlife in the San Francisco Bay and Orange County, with a focus on quantifying the effects of human activity (e.g. recreation pressure, exposure to rodenticides and other toxins), on puma and bobcat habitat use. This information can then be used to inform additional targeted outreach efforts to inform and educate local communities about puma and bobcat ecology, behavior, and movement. They are also working closely with local communities to highlight and reduce areas of human-wildlife conflict, while addressing misconceptions and fears people may have about the species.","donated":1000.0,"years":"2022","website":"https://felidaefund.org","organization":"Felidae Conservation Fund","photo":"https://zeemapsimages.s3.amazonaws.com/3dccd8bf25b307a92889d5e137481b9a-49121569_10156581304869340_1632871339587010560_n.jpg","youtube":"","lat":37.5111,"lng":-121.8009},{"name":"Cheetah Reintroduction Program","country":"India","city":"Bhopal","state":"Madhya Pradesh","category":"CHEETAH","description":"India has embarked on an ambitious Cheetah Reintroduction Project! India\u2019s Honorable Prime Minister released a total of eight cheetahs Acinonyx jubatus, sourced from Namibia, in Kuno National Park (KNP) in the central Indian state of Madhya Pradesh. This first-of-its-kind inter-continental reintroduction of a large cat is indeed a matter of great pride for India and Big Cat Rescue. The cheetahs will be in the Kuno forest completely in the wild, the way it should be.","donated":10000.0,"years":"2023","website":"http://www.corbettfoundation.org/","organization":"Corbett Foundation","photo":"https://zeemapsimages.s3.amazonaws.com/6cc8f08696317e14e544331ddcc3d76d-e1f1e5bd-4350-4bbd-9337-d73db93b37bd.jpg","youtube":"","lat":23.5724,"lng":81.557},{"name":"Bobcat Collaring","country":"United States","city":"New York","state":"New York","category":"BOBCAT","description":"Big Cat Rescue funded Columbia University in their collaboration with Panthera to collar and study bobcat who are poorly managed across their natural range. Panthera is studying the species in a number of sites across the United States. In New York, they currently partner with the New York Columbia Land Conservancy and a number of private landowners to understand bobcat population numbers and habitat use, using camera traps and GPS collars. The methods and analyses will form the basis of a monitoring protocol that will result in better management for the species.","donated":4800.0,"years":"2023","website":"https://panthera.org/blog-post/small-cat-spotlight-bobcat","organization":"Columbia University and Panthera","photo":"https://zeemapsimages.s3.amazonaws.com/4c23f97ed315e0f9c8ac6e264162e390-2021-Jamie-CollaringBobcats_1939677436209855_3985223754202390543_n.jpg","youtube":"","lat":36.5255,"lng":-97.4973},{"name":"VETPAW","country":"South Africa","city":"","state":"","category":"CHEETAH","description":"VETPAW is a group of post 9/11 US veterans with combat skills who are committed to protecting and training park rangers to combat poaching on the ground in Africa. We empower veterans because their skills learned on the frontlines of war are unrivaled.","donated":3000.0,"years":"2023","website":"https://vetpaw.org/","organization":"Veterans Empowered to Protect African Wildlife","photo":"https://zeemapsimages.s3.amazonaws.com/71a6793ade85f01b3cfa591fed2b1ff8-cheetah-conservation.jpg","youtube":"","lat":-27.6008,"lng":21.7263},{"name":"Fishing Cat Conservation Alliance","country":"Sri Lanka","city":"","state":"","category":"FISHING CAT","description":"2026- $25,000 funded. 2025- $50,000 funded: Annual commitment to support Fishing Cat Conservation Alliance (FCCA) work to identify and mitigate threats to the species including conflict with locals and roadkill threats, and to educate and engage local communities in conservation. 2022- Medical supplies for two rehab centers that care for Fishing Cats, Jungle Cats, and Rusty-spotted Cats in Sri Lanka. Threat mitigation and camera traps for Fishing Cats, Jungle Cats and African Wild Cats.","donated":77000.0,"years":"2022-2026","website":"https://fishingcat.org/","organization":"Fishing Cat Conservation Alliance","photo":"https://zeemapsimages.s3.amazonaws.com/fcabcd10a512b3f80b4568bfc4189401-Rehabenclosure-Jim-Sanderson-SriLanka.jpg","youtube":"","lat":9.4547,"lng":78.592},{"name":"David Sheldrick Wildlife Trust","country":"Kenya","city":"","state":"","category":"LION","description":"WATER FOR WILDLIFE/ANTI-POACHING/CANINE UNIT is just what it sounds like. Big Cat Rescue helps supply water to wildlife and anti poaching rangers and their canine units. https://www.sheldrickwildlifetrust.org/projects/canine-unit","donated":8600.0,"years":"2022","website":"https://www.sheldrickwildlifetrust.org/","organization":"David Sheldrick Wildlife Trust","photo":"https://zeemapsimages.s3.amazonaws.com/4599a221b3f81ac8731ff0d39385aad8-The-Sheldrick-Wildlife-Trust-4-750x375.jpeg","youtube":"","lat":-4.2159,"lng":35.5662},{"name":"Environmental Investigation Agency","country":"China","city":"","state":"","category":"TIGER","description":"The Big Cat Rescue Wildcat Walkabout helped fund the undercover investigators at EIA who are fighting the illegal wildlife trade in tigers. This is across several countries, with China being one of the largest consumers of tiger parts.","donated":8600.0,"years":"2022","website":"https://eia-international.org/wildlife/combating-money-laundering/","organization":"Environmental Investigation Agency","photo":"https://zeemapsimages.s3.amazonaws.com/a95352be54331820a1e3ae74a21eb22e-WildTigerJamieIndia2018-03-2309.56.53.jpg","youtube":"","lat":35.0467,"lng":107.0634},{"name":"Tiger Cat Conservation Initiative","country":"Brazil","city":"","state":"","category":"TIGER CAT","description":"2025: To fund for the balance of 2025 a range of activities by the Tiger Cats Conservation Initiative that include spay/neuter/vaccination of free roaming cats and dogs to prevent disease transmission, community eductions through workshops and printed materials, roadkill mitigation through signs, wildlife population monitoring through cameras, predator proof chicken coops and kennels to control free roaming dogs. 2022: Big Cat Rescue via its Wildcat Walkabout was able to fund the Tiger Cat Conservation Initiative AKA Tadeu de Oliveira in their tiger cat conservation work and specifically threat mitigation in Brazil and Columbia.","donated":147643.0,"years":"2022, 2025, 2026","website":"https://www.instagram.com/tigercatsconservation/?hl=en","organization":"Tiger Cat Conservation Initiative","photo":"https://zeemapsimages.s3.amazonaws.com/48ba9e79728ef9ac4ebc00614137ade1-TigerCat-Tadeu-de-Oliveira.jpg","youtube":"8-hPVw-HdgY","lat":-13.2103,"lng":-52.7658},{"name":"African Golden Cat","country":"Uganda","city":"","state":"","category":"GOLDEN CAT","description":"Big Cat Rescue helped fund threat mitigation by helping protect farmed pigs from becoming prey by African Golden Cats.","donated":1000.0,"years":"2022","website":"https://africainconbio.org/directory/mwezi-badru-mugerwa/","organization":"Embaka/Badru Magerwa","photo":"https://zeemapsimages.s3.amazonaws.com/ccadf639d4508809f99946f52937b225-AfricangoldencatWuppertalZoo-Jim-Sanderson.jpg","youtube":"","lat":2.0374,"lng":33.0441},{"name":"Rusty Spotted Cat","country":"Nepal","city":"","state":"","category":"RUSTY SPOTTED CAT","description":"Vidyman Thapa who works with Third Pole Conservancy was given a grant to preserve Rusty Spotted Cats.","donated":5000.0,"years":"2022","website":"https://www.thirdpoleconservancy.org/team","organization":"Vidyman Thapa","photo":"https://zeemapsimages.s3.amazonaws.com/dc1521ccb6a4382de1dfbc561d10947a-Rusty_spotted_cat_1.jpg","youtube":"","lat":27.9473,"lng":87.0413},{"name":"Asociaci\u00f3n Amigos de Felinos AMFE","country":"Costa Rica","city":"","state":"","category":"MARGAY","description":"Big Cat Rescue is assisting in the preservation of margay in Costa Rica by our partnership with Xinia Villarreal of the Asociaci\u00f3n Amigos de Felinos AMFE.","donated":5000.0,"years":"2022","website":"http://amigosdefelinos.com/english/","organization":"Asociaci\u00f3n Amigos de Felinos AMFE","photo":"https://zeemapsimages.s3.amazonaws.com/d7d75eccd7776206fe1c63d26e5eacec-MargayCincinnatiZoo-Jim-Sanderson.jpg","youtube":"","lat":8.9638,"lng":-83.5053},{"name":"Seeking the Andean Mountain Cats","country":"Chile","city":"","state":"","category":"ANDEAN CAT","description":"Big Cat Rescue remembers when Dr. Jim Sanderson first proved the beautiful and elusive Andean Mountain Cat had not gone extinct. Since the 90s we have been involved in the Preservation of Andean Cats, Pampas Cats, & Guigna by funding those projects that Dr. Sanderson has vetted as having the most impact.","donated":8500.0,"years":"2022","website":"https://laderasur.com/articulo/velos-aqui-y-vota-por-tu-favorito-los-documentales-finalistas-de-la-competencia-nacional-de-santiago-wild/","organization":"Seeking the Andean Wild Cats","photo":"https://zeemapsimages.s3.amazonaws.com/9c28ffeab63333e89bd07d22ef41e932-Andeancat1JimSanderson.jpg","youtube":"","lat":-33.142,"lng":-71.1453},{"name":"African Golden Cat AfriCGE","country":"South Sudan","city":"","state":"","category":"GOLDEN CAT","description":"Supporting Imran Ejotre, of AFRICEGE, which is a Think Tank and innovation hub supporting the transition to a new/green economy in east and southern Africa. Through engaging with policymakers, business leaders and academia, and protecting the African Golden Cat, Africege promotes evidence-based policy implementation and the development of appropriate skills for the transition towards a green economy.","donated":7500.0,"years":"2022","website":"https://africancentre.org/","organization":"African Center for a Green Economy","photo":"https://zeemapsimages.s3.amazonaws.com/a6137a6fb64ed9c704d6c12bc56b6254-AfricangoldencatNationalGeographic-Jim-Sanderson.jpg","youtube":"","lat":5.1349,"lng":32.7692},{"name":"Eastern Himalayas Clouded Leopard and Marbled Cat Project-INDIA","country":"India","city":"","state":"","category":"CLOUDED LEOPARD","description":"Big Cat Rescue admires the work being done by Giridhar Malla to protect Marbled Cats & Clouded Leopards in India. $9000 This is a continuation of a project funded 12/22. Marbled Cats and Clouded Leopards are classified as Near Threatened and Vulnerable in the IUCN Red List. Threats include hunting, snaring, poaching, habitat loss since it prefers very thick rainforests, and human conflict due to livestock predation. The study area of this project is Northeast India. Main objectives are building more predation resistant chicken coops and education and training programs. The latter includes education on the conservation status of the two species, training the local youth about the conservation of small cats and making them as native field guides, and training the forest department frontline staff on camera trapping to help in assessing the distribution of these cat species. $6000","donated":20900.0,"years":"2022-2023","website":"https://www.instagram.com/giridharmalla/?hl=en","organization":"Eastern Himalayas Marbled Cat Project-INDIA","photo":"https://zeemapsimages.s3.amazonaws.com/421628e1d9a503ebe13bac9c132f6705-CloudedleopardNevilleBuck-Jim-Sanderson.jpg","youtube":"","lat":21.2499,"lng":81.302},{"name":"Manoa's Pampas Cat Preservation","country":"Uruguay","city":"","state":"","category":"PAMPAS CAT","description":"Supporting Santiago Turcatti Oviedo in the conservation and research of the Pampas cat biome to save these wild cats. See more at https://www.instagram.com/rockandpampa","donated":5000.0,"years":"2022","website":"https://www.instagram.com/rockandpampa/","organization":"Rock & Pampa","photo":"https://zeemapsimages.s3.amazonaws.com/b9ac54641ba08143d67a34cb39a4e499-PampasCatSantiago_5058096647522856333_y.jpg","youtube":"","lat":-33.0856,"lng":-54.1415},{"name":"Wildlife Friends Foundation Thailand","country":"Thailand","city":"Tha Mai Ruak","state":"Phetchaburi","category":"TIGER","description":"Eleven Tigers in Thailand Were Rescued In a Historic Collaboration by Typical Tigers NFTs and Big Cat Rescue! It was the First Tiger Rescue Mission Funded In Part By Cryptocurrencies and NFTs!","donated":20000.0,"years":"2022","website":"https://www.wfft.org/","organization":"Wildlife Friends Foundation Thailand","photo":"https://zeemapsimages.s3.amazonaws.com/65a0a8490e93692b4d231c20a29d66e4-WildlifeFriendsFoundationThailandEdwinWiekNFT.jpg","youtube":"","lat":13.5433,"lng":102.048},{"name":"Colocolo Project","country":"Chile","city":"","state":"","category":"PAMPAS CAT","description":"2024 Conservation initiatives to minimize the impact of domestic animals on wild carnivores. Objectives: (1) To vaccinate at least the 75% of all domestic dogs and cats in Vilches Alto (village adjacent to the Reserve). (2) To deworm domestic animals that interact with wildlife. (3) Reduce human-pampas cat conflict by improving hen houses. (4) Create an animation for children showing the dangers faced by small wild cats. Continuation/expansion of previously successful project. 2023 In Chile the Pampas cat is known as the Colocolo, which comes from its Latin name. The Colocolo Project has a number of elements. One is studying the cat with camera traps and fecal analysis to learn what habitats and prey it prefers and how many there are to help preserve them. Another is mitigation of conflict between the cats and small-scale poultry farmers to avoid revenge killing driven by the cats taking their chickens. This is done by helping build predator proof chicken coops and giving replacement hens to farmers who suffer losses. Third, the Project includes broad efforts with volunteers and volunteer veterinarians to vaccinate and worm dogs and cats to keep them from spreading disease to the wild animal population.","donated":9500.0,"years":"2023, 2024","website":"https://www.youtube.com/watch?v=OXlQ_dqJhjQ","organization":"The Colocolo Project","photo":"https://zeemapsimages.s3.amazonaws.com/0af50640e697fc4a066990402ac99f45-PampascatPeruRobWilliams-Jim-Sanderson.jpg","youtube":"OXlQ_dqJhjQ","lat":-32.7608,"lng":-74.4137},{"name":"WILD CARE Nepal","country":"Nepal","city":"","state":"","category":"JUNGLE CAT","description":"This project aims to reduce the threats to Jungle Cats and Leopard Cats in central (Dhanushadham) and eastern (Mahamahi) Nepal. 2025 This project brings together each year 15-20 students from different Terai districts of Nepal, representing diverse academic backgrounds. The overall goal of this program is to ensure long-term survival and conservation of wild cats in Nepal by promoting co-existence through outreach and educational interventions. The participants receive intense training in conservation issues, the critical role of preserving the cat populations, and training in presentation and communication skills. They are given materials to use in presentations that teach peaceful coexistence with the predator cats. They report back on their activities and must achieve specific goals in order to earn their certificate. 2023 The main activities of this project include camera trapping, road signage, hoarding board installations, school education programs, and community awareness in the new sites. This project is supervised by Rama Mishra, a Ph.D. candidate at the University of Antwerp, Belgium","donated":4000.0,"years":"2023, 2025","website":"https://www.instagram.com/ramamishra/","organization":"Rama Mishra","photo":"https://zeemapsimages.s3.amazonaws.com/e3651eee102bda5d4df28d125bd67a57-islee.jpg","youtube":"","lat":25.8879,"lng":85.2449},{"name":"Guigna in San Vicente de Tagua Tagua","country":"Chile","city":"San Vicente de Tagua Tagua","state":"O'Higgins","category":"GUIGNA","description":"Project goal is saving the smallest cat of South America the G\u00fci\u00f1a from drought in central Chile (San Vicente de Tagua Tagua). Objectives are: 1. Install camera traps for monitoring the paths that the G\u00fci\u00f1a uses frequently and choose the best spots to place the water. 2. Install water drinkers in areas where the target species is a frequent visitor. 3. Design and print educational material of free distribution for the local community to learn about the importance of our wildlife. Most of the funds would be spent on camera trapping costs. The drinkers are supplied from
